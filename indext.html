<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>UTM Campaign Manager</title>
<style>
:root{
  --bg:#f4f6f9;--sf:#fff;--sf2:#f0f2f5;--sf3:#e8eaed;
  --bd:#dde1e7;--bd2:#c5cad3;
  --tx:#1c1f26;--tx2:#4a5264;--tx3:#8b93a4;
  --bl:#2563eb;--bl2:#1d4ed8;--bl-bg:#eff4ff;--bl-lt:#dbeafe;
  --gn:#15803d;--gn-bg:#f0fdf4;--gn-lt:#bbf7d0;
  --am:#b45309;--am-bg:#fffbeb;--am-lt:#fde68a;
  --rd:#dc2626;--rd-bg:#fef2f2;
  --pu:#7c3aed;--pu-lt:#ede9fe;
  --in:#4338ca;--in-bg:#eef2ff;
  --r:8px;--r2:5px;--r3:4px;
  --sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 16px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI','Noto Sans KR',sans-serif;font-size:13px;background:var(--bg);color:var(--tx)}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:260px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:11px 13px 9px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:7px}
.sb-logo h1{font-size:13px;font-weight:700;flex:1}
.sb-logo button{font-size:13px;border:none;background:transparent;cursor:pointer;color:var(--tx3);padding:3px 5px;border-radius:4px}
.sb-logo button:hover{background:var(--sf2)}
.sb-scroll{flex:1;overflow-y:auto;padding:6px}
.sb-sec{padding:5px 6px 3px;font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;justify-content:space-between}
.sb-sec button{font-size:10px;padding:1px 7px;border-radius:3px;border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--tx2)}
.sb-sec button:hover{background:var(--sf2)}

/* advertiser rows */
.adv-hd{display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:var(--r2);cursor:pointer;user-select:none}
.adv-hd:hover{background:var(--sf2)}
.adv-hd.sel{background:var(--bl-bg)}
.adv-icon{font-size:12px;color:var(--tx3);flex-shrink:0}
.adv-nm{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.adv-hd.sel .adv-nm{color:var(--bl)}
.adv-exp{font-size:9px;color:var(--tx3);transition:transform .15s;flex-shrink:0}
.adv-exp.op{transform:rotate(90deg)}
.adv-acts{display:none;gap:2px}
.adv-hd:hover .adv-acts{display:flex}
.nb{font-size:10px;padding:1px 5px;border-radius:3px;border:none;background:transparent;cursor:pointer;color:var(--tx3)}
.nb:hover{background:var(--sf3);color:var(--tx)}
.nb.del:hover{background:var(--rd-bg);color:var(--rd)}

/* project rows */
.proj-tree{padding-left:14px;display:none}
.proj-tree.op{display:block}
.proj-hd{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:var(--r2);cursor:pointer;margin-bottom:1px}
.proj-hd:hover{background:var(--sf2)}
.proj-hd.sel{background:var(--bl-bg)}
.proj-dot{width:6px;height:6px;border-radius:50%;background:var(--bd2);flex-shrink:0}
.proj-hd.sel .proj-dot{background:var(--bl)}
.proj-nm{flex:1;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-hd.sel .proj-nm{color:var(--bl);font-weight:600}
.proj-acts{display:none;gap:2px}
.proj-hd:hover .proj-acts{display:flex}

/* inline add form */
.add-form{padding:3px 5px 5px;margin-left:0}
.add-form.indent{padding-left:18px}
.add-form input{width:100%;font-size:11px;padding:4px 7px;border:1px solid var(--bd);border-radius:4px;background:var(--sf);color:var(--tx);margin-bottom:3px}
.add-row{display:flex;gap:4px}
.add-row button{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--tx2)}
.add-row button.ok{background:var(--bl);color:#fff;border-color:var(--bl)}
.add-link{display:flex;align-items:center;gap:3px;font-size:10px;padding:3px 8px;border-radius:4px;border:1px dashed var(--bd2);background:transparent;cursor:pointer;color:var(--tx3);width:fit-content;margin:2px 0 2px 14px}
.add-link:hover{background:var(--sf2);color:var(--tx2)}
.sb-footer{padding:7px;border-top:1px solid var(--bd);flex-shrink:0}
.sb-footer button{width:100%;font-size:11px;padding:5px;border:none;background:var(--bl);color:#fff;border-radius:var(--r2);cursor:pointer;font-weight:500}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.mhd{padding:8px 16px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.bc{font-size:10px;color:var(--tx3);margin-bottom:1px}
.bc .b1{color:var(--tx2);font-weight:500}
.bc .b2{color:var(--bl);font-weight:600}
.mt{font-size:14px;font-weight:700}
.ms{font-size:10px;color:var(--tx3);margin-top:1px}
.tabs{display:flex;gap:3px;margin-left:auto}
.tab{font-size:11px;padding:5px 11px;border-radius:var(--r2);border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer}
.tab.on{background:var(--bl);color:#fff;border-color:var(--bl)}
/* 드롭다운 탭 메뉴 */
.tab-group{position:relative;display:inline-flex;flex-direction:column}
.tab-group-btn{display:flex;align-items:center;gap:4px;font-size:11px;padding:5px 11px;border-radius:var(--r2);border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;white-space:nowrap}
.tab-group-btn:hover,.tab-group-btn.on{background:var(--sf2)}
.tab-group-btn.on{font-weight:600;color:var(--tx)}
.tab-group-arrow{font-size:8px;transition:transform .2s;opacity:.5;display:inline-block}
.tab-group-arrow.open{transform:rotate(180deg);opacity:1}
.tab-dropdown{display:none;position:absolute;top:100%;left:0;min-width:180px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh2);z-index:200;overflow:hidden;padding-top:4px}
.tab-dropdown.open{display:block}
.tab-dd-item{display:flex;align-items:center;gap:7px;padding:9px 14px;font-size:12px;cursor:pointer;color:var(--tx2);border-bottom:1px solid var(--sf3);transition:background .1s;user-select:none}
.tab-dd-item:last-child{border-bottom:none}
.tab-dd-item:hover{background:var(--bl-bg);color:var(--bl)}
.tab-dd-item.on{background:var(--bl-bg);color:var(--bl);font-weight:600}
.tab-dd-item .dd-icon{font-size:13px;flex-shrink:0}
/* 메인 탭바 스타일 조정 */
.tabs{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow:visible}
.tab-divider{width:1px;height:20px;background:var(--bd);margin:0 2px;flex-shrink:0}
#ct{flex:1;overflow:hidden;display:flex}
.tp{width:56%;flex-shrink:0;overflow-y:auto;padding:12px;border-right:1px solid var(--bd)}
.lp{flex:1;overflow-y:auto;padding:12px;min-width:0}

/* CAMPAIGN TREE */
.tw{display:flex;flex-direction:column;gap:8px}
.cc{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.cc.dr{border-style:dashed;border-color:var(--tx3)}
.chd{display:flex;align-items:center;gap:7px;padding:9px 11px;cursor:pointer;user-select:none}
.chd:hover{background:var(--sf2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lc{background:var(--bl)}.lg{background:var(--gn)}.la{background:var(--am)}
.cn{font-size:12px;font-weight:600;flex:1;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dtag{font-size:9px;padding:1px 5px;border-radius:10px;background:var(--sf3);color:var(--tx3)}
.ex{font-size:9px;color:var(--tx3);transition:transform .18s;flex-shrink:0}
.ex.op{transform:rotate(90deg)}
.has{display:flex;gap:3px;flex-shrink:0}
.ib{font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--tx2);white-space:nowrap}
.ib:hover{background:var(--sf2)}
.ib.del{color:var(--rd);border-color:transparent}
.ib.del:hover{background:var(--rd-bg)}
.ib.ld_{color:var(--pu);border-color:var(--pu);background:var(--pu-lt)}
.ib.sv{color:var(--in);border-color:var(--in);background:var(--in-bg)}
.bdg{display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:600;white-space:nowrap}
.bc_{background:var(--bl-lt);color:var(--bl)}
.bg_{background:var(--gn-lt);color:var(--gn)}
.ba_{background:var(--am-lt);color:var(--am)}
.bn_{background:var(--sf3);color:var(--tx2)}
.cb{display:none;padding:0 11px 10px;border-top:1px solid var(--bd)}
.cb.op{display:block}
.curl-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--in-bg);border-radius:var(--r2);margin-top:8px;margin-bottom:2px}
.curl-bar label{font-size:10px;font-weight:600;color:var(--in);white-space:nowrap}
.curl-bar input{flex:1;font-size:11px;padding:4px 8px;border:1px solid #c7d2fe;border-radius:4px;background:var(--sf);color:var(--tx)}
.curl-bar button{font-size:10px;padding:4px 10px;border-radius:4px;border:none;background:var(--in);color:#fff;cursor:pointer;white-space:nowrap}
.gl{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.gc{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.gc.dr{border-style:dashed;border-color:var(--tx3)}
.ghd{display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer}
.ghd:hover{background:#e3e6eb}
.gn_{font-size:11px;font-weight:600;flex:1;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gb{display:none;padding:0 9px 8px;border-top:1px solid var(--bd)}
.gb.op{display:block}
.al{display:flex;flex-direction:column;gap:3px;margin-top:5px}
.ar{display:flex;align-items:center;gap:5px;padding:5px 7px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r3)}
.ar.dr{border-style:dashed;border-color:var(--tx3)}
.an{font-size:10px;font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cpb{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--tx2);white-space:nowrap}
.cpb:hover{background:var(--bl-bg);color:var(--bl)}
.cpb.ok{color:var(--gn);border-color:var(--gn)}
.addb{display:inline-flex;align-items:center;gap:3px;margin-top:6px;font-size:11px;padding:4px 9px;border-radius:var(--r3);border:1px dashed var(--bd2);background:transparent;color:var(--tx3);cursor:pointer}
.addb:hover{background:var(--sf2);color:var(--tx2)}
.addb.main{border-style:solid;color:var(--bl);border-color:var(--bl);font-weight:600;font-size:12px;padding:6px 14px}
.addb.main:hover{background:var(--bl-bg)}

/* INLINE FORM */
.iform{border-radius:var(--r2);padding:10px;margin-top:6px;border:1px solid}
.ifc{background:var(--bl-bg);border-color:var(--bl-lt)}
.ifg{background:var(--gn-bg);border-color:var(--gn-lt)}
.ifa{background:var(--am-bg);border-color:var(--am-lt)}
.ift{font-size:10px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.iftc{color:var(--bl)}.iftg{color:var(--gn)}.ifta{color:var(--am)}
.fg{display:grid;gap:6px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:none){.g3,.g4{grid-template-columns:1fr 1fr}}
.ff{display:flex;flex-direction:column;gap:2px}
.fl{font-size:10px;color:var(--tx2);font-weight:500}
.rq{color:var(--rd);margin-left:2px;font-size:9px}
.op_{color:var(--gn);font-size:9px;margin-left:2px}
select,input[type=text]{width:100%;font-size:11px;padding:5px 7px;border-radius:var(--r3);border:1px solid var(--bd);background:var(--sf);color:var(--tx)}
select:focus,input:focus{outline:none;border-color:var(--bl)}
.fpv{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r3);padding:5px 8px;font-family:monospace;font-size:10px;color:var(--tx2);word-break:break-all;margin-top:5px;min-height:22px}
.fa{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:5px 11px;border-radius:var(--r3);border:1px solid var(--bd);background:transparent;color:var(--tx);cursor:pointer}
.btn:hover{background:var(--sf2)}
.btnp{background:var(--bl);color:#fff;border-color:var(--bl)}
.btnp:hover{background:var(--bl2)}
.uhint{font-size:10px;color:var(--in);background:var(--in-bg);padding:4px 8px;border-radius:var(--r3);margin-top:5px}

/* LIST */
.lphd{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.lphd input{font-size:11px;padding:5px 8px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--sf);color:var(--tx);width:160px}
.lphd select{font-size:11px;padding:5px 7px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--sf);color:var(--tx)}
.tbw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:500px}
th{text-align:left;padding:6px 7px;border-bottom:2px solid var(--bd);font-size:9px;font-weight:700;color:var(--tx2);text-transform:uppercase;white-space:nowrap;background:var(--sf);position:sticky;top:0;z-index:1}
td{padding:5px 7px;border-bottom:1px solid var(--bd);vertical-align:middle;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:var(--sf2)}
.tdr td{color:var(--tx3)}
.tg{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.tc{background:var(--bl-lt);color:var(--bl)}.tgg{background:var(--gn-lt);color:var(--gn)}.ta{background:var(--am-lt);color:var(--am)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.md{background:var(--sf);border-radius:var(--r);box-shadow:var(--sh2);width:560px;max-width:96vw;max-height:84vh;display:flex;flex-direction:column;overflow:hidden}
.mhd_{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.mhd_ h2{font-size:14px;font-weight:700}
.mc{font-size:16px;border:none;background:transparent;cursor:pointer;color:var(--tx2);padding:2px 7px;border-radius:3px}
.mc:hover{background:var(--sf2)}
.mb{overflow-y:auto;flex:1;padding:13px 16px}
.ms_{width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--sf);color:var(--tx);margin-bottom:8px}
.pl{border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;max-height:360px;overflow-y:auto}
.pr{display:flex;align-items:center;gap:8px;padding:9px 10px;border-bottom:1px solid var(--bd);cursor:pointer}
.pr:last-child{border-bottom:none}
.pr:hover{background:var(--bl-bg)}
.pn{font-family:monospace;font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi{font-size:10px;color:var(--tx3);white-space:nowrap}

/* TAX */
.txt{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.txb{font-size:11px;padding:4px 10px;border-radius:var(--r3);border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer}
.txb.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.txs{display:none}.txs.on{display:block}
.txl{border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:8px}
.txr{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--bd)}
.txr:last-child{border-bottom:none}
.txr:hover{background:var(--sf2)}
.txv{font-family:monospace;font-size:11px;font-weight:600;min-width:100px;color:var(--tx)}
.txl_{font-size:11px;flex:1;color:var(--tx2)}
.txe{font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--tx2)}
.txe:hover{background:var(--sf2)}
.txd{font-size:10px;padding:2px 6px;border-radius:3px;border:none;background:transparent;cursor:pointer;color:var(--rd)}
.txd:hover{background:var(--rd-bg)}
.txaf{display:flex;gap:6px;align-items:center}
.txaf input{font-size:11px;padding:5px 8px;border:1px solid var(--bd);border-radius:var(--r3);background:var(--sf);color:var(--tx)}

/* SV */
.svmd{width:700px}
.svs{margin-bottom:14px}
.svt{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.svr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--sf3)}
.svr:last-child{border-bottom:none}
.svl{font-size:10px;color:var(--tx3);min-width:85px;flex-shrink:0}
.svv{font-family:monospace;font-size:11px;flex:1;word-break:break-all;color:var(--tx)}
.svcp{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--tx2);white-space:nowrap;flex-shrink:0}
.svcp:hover{background:var(--bl-bg);color:var(--bl)}
.svcp.ok{color:var(--gn);border-color:var(--gn)}
.svad{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r2);padding:9px 11px;margin-bottom:7px}
.svadnm{font-family:monospace;font-size:11px;font-weight:600;margin-bottom:7px}
.svutm{word-break:break-all;font-family:monospace;font-size:10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r3);padding:5px 8px;color:var(--tx2);margin-bottom:4px}
.svac{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.cpall{width:100%;padding:8px;font-size:12px;font-weight:500;border:1px solid var(--bd);border-radius:var(--r2);background:transparent;cursor:pointer;color:var(--tx);margin-top:10px}
.cpall:hover{background:var(--sf2)}

/* PH */
.ph{display:flex;align-items:center;justify-content:center;height:100%;flex:1}
.phi{text-align:center}
.phi .ico{font-size:36px;margin-bottom:10px}
.phi p{font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:3px}
.phi span{font-size:11px;color:var(--tx3)}
.empty{text-align:center;padding:28px;color:var(--tx3);font-size:12px}
</style>
</head>
<body>
<div class="app">
<div class="sb">
  <div class="sb-logo">
    <h1>📊 UTM Manager</h1>
    <button onclick="openTax()" title="택소노미 관리">⚙</button>
  </div>
  <div class="sb-scroll" id="sb-scroll">
    <div class="sb-sec">
      <span>광고주 · 프로젝트</span>
      <button onclick="addAdvInline()">+ 광고주</button>
    </div>
    <div id="nav"></div>
    <div id="adv-add-wrap"></div>
  </div>
</div>
<div class="main">
  <div class="mhd" id="mhd" style="display:none">
    <div style="flex:1;min-width:0">
      <div class="bc" id="bc"></div>
      <div class="mt" id="mt"></div>
      <div class="ms" id="ms"></div>
    </div>
    <div class="tabs" id="main-tabs">

      <!-- 1. 프로젝트 스케줄 -->
      <button class="tab-group-btn" id="tab-gt" onclick="setTab('gt')"
        style="color:#7c3aed;border-color:#7c3aed">
        📅 프로젝트 스케줄
      </button>

      <span class="tab-divider"></span>

      <!-- 2. 미디어 믹스 -->
      <button class="tab-group-btn" id="tab-mm" onclick="setTab('mm')"
        style="color:#0891b2;border-color:#0891b2">
        📊 미디어 믹스
      </button>

      <span class="tab-divider"></span>

      <!-- 3. 캠페인 네이밍/택소노미 드롭다운 -->
      <div class="tab-group">
        <button class="tab-group-btn" id="tabg-naming" style="color:var(--bl);border-color:var(--bl)" onmouseenter="openDd('dd-naming')" onmouseleave="scheduleDdClose('dd-naming')">

  </div>
</div>
</div>

<script>
const SK='utm6';
let S={advs:{},tx:{}};
// advs: {id,name, projects:{id,name,campaigns:[...]}}
let cAdv=null,cProj=null,cTab='gt',op={},advOp={};

const TXD={
  campAttr:[{v:'always',l:'always — 상시'},{v:'event',l:'event — 이벤트성'},{v:'brand',l:'brand — 브랜딩'}],
  goal:[{v:'aware',l:'aware'},{v:'traffic',l:'traffic'},{v:'engage',l:'engage'},{v:'leads',l:'leads'},{v:'install',l:'install'},{v:'purchase',l:'purchase'},{v:'signup',l:'signup'},{v:'bsa',l:'bsa'},{v:'pwLnk',l:'pwLnk'},{v:'shpngSrch',l:'shpngSrch'},{v:'pwCntnts',l:'pwCntnts'}],
  src:[{v:'go',l:'go — 구글'},{v:'fb',l:'fb — 페이스북'},{v:'i',l:'i — 인스타그램'},{v:'tik',l:'tik — 틱톡'},{v:'k_da',l:'k_da — 카카오DA'},{v:'n_gfa',l:'n_gfa — 네이버GFA'},{v:'n_sa',l:'n_sa — 네이버SA'},{v:'mt',l:'mt — 메타'},{v:'yt',l:'yt — 유튜브'},{v:'SMR',l:'SMR'},{v:'ip',l:'ip — IPTV'},{v:'nfx',l:'nfx — 넷플릭스'},{v:'tvng',l:'tvng — 티빙'}],
  med:[{v:'organic',l:'organic'},{v:'social',l:'social'},{v:'cpc',l:'cpc'},{v:'paidSearch',l:'paidSearch'},{v:'cpm',l:'cpm'},{v:'dmndgn',l:'dmndgn'},{v:'asc',l:'asc'},{v:'vvc',l:'vvc'},{v:'vrc',l:'vrc'},{v:'dv360',l:'dv360'},{v:'ytprm',l:'ytprm'},{v:'eng_views',l:'eng_views'},{v:'rch_vd',l:'rch_vd'},{v:'ifd_vd',l:'ifd_vd'},{v:'std_vd',l:'std_vd'},{v:'ctv_prmr',l:'ctv_prmr'},{v:'eng_post',l:'eng_post'}],
  tgt:[{v:'newtarget',l:'newtarget'},{v:'lookalike',l:'lookalike'},{v:'retarget',l:'retarget'}],
  gender:[{v:'P',l:'P — 전체'},{v:'M',l:'M — 남성'},{v:'F',l:'F — 여성'},{v:'non',l:'non — 미설정'}],
  appeal:[{v:'Launching',l:'Launching'},{v:'VS',l:'VS'},{v:'Suggestion',l:'Suggestion'},{v:'BeforeAfter',l:'BeforeAfter'},{v:'Review',l:'Review'},{v:'Experiences',l:'Experiences'},{v:'RealUse',l:'RealUse'},{v:'CompetitiveEdge',l:'CompetitiveEdge'},{v:'Benefits',l:'Benefits'},{v:'Mbenefits',l:'Mbenefits'},{v:'Fomo',l:'Fomo'},{v:'Toptrend',l:'Toptrend'},{v:'Number',l:'Number'},{v:'Oneline',l:'Oneline'},{v:'ProsCons',l:'ProsCons'},{v:'Storytelling',l:'Storytelling'},{v:'Information',l:'Information'},{v:'Meme',l:'Meme'},{v:'Quality',l:'Quality'},{v:'BrandVideo',l:'BrandVideo'},{v:'Feed',l:'Feed'}],
  adtype:[{v:'Video',l:'Video'},{v:'Image',l:'Image'},{v:'ImageSlide',l:'ImageSlide'},{v:'VideoSlide',l:'VideoSlide'},{v:'Cartoon',l:'Cartoon'},{v:'Cate_Item',l:'Cate_Item'},{v:'Carousel',l:'Carousel'}],
  ratio:[{v:'LS',l:'LS — 가로'},{v:'VT',l:'VT — 세로'},{v:'SQ',l:'SQ — 정방형'}],
  sec:[{v:'6s',l:'6s'},{v:'15s',l:'15s'},{v:'30s',l:'30s'},{v:'60s',l:'60s'}]
};
const TXM=[
  {k:'campAttr',l:'캠페인속성'},{k:'goal',l:'목표'},{k:'src',l:'소스'},{k:'med',l:'매체'},
  {k:'tgt',l:'타겟속성'},{k:'gender',l:'성별'},{k:'appeal',l:'소구점'},{k:'adtype',l:'소구유형'},
  {k:'ratio',l:'비율'},{k:'sec',l:'초'}
];
let curTxK=TXM[0].k;

function ld(){
  try{const s=localStorage.getItem(SK);if(s)S=JSON.parse(s);}catch(e){}
  if(!S.advs)S.advs={};if(!S.tx)S.tx={};
  TXM.forEach(m=>{if(!S.tx[m.k])S.tx[m.k]=JSON.parse(JSON.stringify(TXD[m.k]));});
  if(!S.gantt)S.gantt={};
  if(!S.done)S.done={};
  if(!S.cl)S.cl={};
  if(!S.sg)S.sg={};
  if(!S.mm)S.mm={};
  rNav();
}
function sv(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function gv(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function opts(k,sel){return '<option value="">선택</option>'+(S.tx[k]||[]).map(o=>`<option value="${o.v}"${o.v===sel?' selected':''}>${o.l}</option>`).join('');}
function bC(f){return[f.date,f.attr,f.evt,f.goal,f.src,f.med,f.num].filter(Boolean).join('-');}
function bG(f){return[f.date,f.tgt,f.gender,f.age,f.interest,f.num].filter(Boolean).join('-');}
function bA(f){return[f.date,f.product,f.appeal,f.adtype,f.ratio,f.sec,f.num].filter(Boolean).join('-');}
function bU(url,c,g,a,src,med){
  if(!url)return'';
  const p=new URLSearchParams();
  if(src)p.set('utm_source',src);if(med)p.set('utm_medium',med);
  if(c)p.set('utm_campaign',c);if(g)p.set('utm_term',g);if(a)p.set('utm_content',a);
  const q=p.toString();return url+(q?(url.includes('?')?'&':'?')+q:'');
}
function isDr(f){return!f||!f.date;}
function getProj(){return cAdv&&cProj?S.advs[cAdv]?.projects?.[cProj]:null;}
function getCamp(cid){return getProj()?.campaigns?.find(c=>c.id===cid);}
function getGrp(cid,gid){return getCamp(cid)?.groups?.find(g=>g.id===gid);}
function getAd(cid,gid,aid){return getGrp(cid,gid)?.ads?.find(a=>a.id===aid);}

// ── NAV ──
function rNav(){
  const nav=document.getElementById('nav');
  const advs=Object.values(S.advs);
  if(!advs.length){nav.innerHTML='<div style="padding:10px 8px;font-size:11px;color:var(--tx3);text-align:center">광고주를 추가해주세요</div>';return;}
  nav.innerHTML=advs.map(adv=>{
    const isOp=advOp[adv.id]!==false;
    const projs=Object.values(adv.projects||{});
    return `<div>
      <div class="adv-hd${cAdv===adv.id&&!cProj?' sel':''}" onclick="togAdv('${adv.id}')">
        <span class="adv-icon">🏢</span>
        <span class="adv-nm" title="${adv.name}">${adv.name}</span>
        <div class="adv-acts">
          <button class="nb" onclick="event.stopPropagation();editAdv('${adv.id}')" title="수정">✎</button>
          <button class="nb del" onclick="event.stopPropagation();delAdv('${adv.id}')" title="삭제">✕</button>
        </div>
        <span class="adv-exp${isOp?' op':''}">▶</span>
      </div>
      <div class="proj-tree${isOp?' op':''}" id="ptree-${adv.id}">
        ${projs.map(proj=>`
        <div class="proj-hd${cAdv===adv.id&&cProj===proj.id?' sel':''}" onclick="selProj('${adv.id}','${proj.id}')">
          <span class="proj-dot"></span>
          <span class="proj-nm" title="${proj.name}">${proj.name}</span>
          <div class="proj-acts">
            <button class="nb" onclick="event.stopPropagation();editProj('${adv.id}','${proj.id}')" title="수정">✎</button>
            <button class="nb del" onclick="event.stopPropagation();delProj('${adv.id}','${proj.id}')" title="삭제">✕</button>
          </div>
        </div>`).join('')}
        <button class="add-link" onclick="addProjInline('${adv.id}')">＋ 프로젝트 추가</button>
        <div id="padd-${adv.id}"></div>
      </div>
    </div>`;
  }).join('');
}

function togAdv(id){
  advOp[id]=advOp[id]===false?true:false;
  const tree=document.getElementById('ptree-'+id);
  const hd=tree?.previousElementSibling;
  if(tree)tree.classList.toggle('op',advOp[id]!==false);
  if(hd){const ex=hd.querySelector('.adv-exp');if(ex)ex.classList.toggle('op',advOp[id]!==false);}
}

// ── ADVERTISER CRUD ──
function addAdvInline(){
  const wrap=document.getElementById('adv-add-wrap');
  if(wrap.innerHTML){wrap.innerHTML='';return;}
  wrap.innerHTML=`<div class="add-form" style="margin-top:4px">
    <input type="text" id="adv-new-inp" placeholder="광고주명" onkeydown="if(event.key==='Enter')saveAdvNew();if(event.key==='Escape')document.getElementById('adv-add-wrap').innerHTML=''">
    <div class="add-row">
      <button class="ok" onclick="saveAdvNew()">추가</button>
      <button onclick="document.getElementById('adv-add-wrap').innerHTML=''">취소</button>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('adv-new-inp')?.focus(),10);
}
function saveAdvNew(){
  const name=gv('adv-new-inp');if(!name)return;
  const id=uid();S.advs[id]={id,name,projects:{}};
  advOp[id]=true;
  document.getElementById('adv-add-wrap').innerHTML='';
  sv();rNav();
}
function editAdv(id){
  const n=prompt('광고주 이름 변경:',S.advs[id]?.name);
  if(!n||n===S.advs[id]?.name)return;
  S.advs[id].name=n;sv();rNav();
  if(cAdv===id)document.getElementById('mt').textContent=n;
}
function delAdv(id){
  if(!confirm(`"${S.advs[id]?.name}" 광고주를 삭제할까요?\n모든 프로젝트와 캠페인이 삭제됩니다.`))return;
  delete S.advs[id];
  if(cAdv===id){cAdv=null;cProj=null;showPH();}
  sv();rNav();
}

// ── PROJECT CRUD ──
function addProjInline(advId){
  const wrap=document.getElementById('padd-'+advId);
  if(!wrap)return;
  if(wrap.innerHTML){wrap.innerHTML='';return;}
  wrap.innerHTML=`<div class="add-form indent">
    <input type="text" id="proj-inp-${advId}" placeholder="프로젝트명" onkeydown="if(event.key==='Enter')saveProjNew('${advId}');if(event.key==='Escape')document.getElementById('padd-${advId}').innerHTML=''">
    <div class="add-row">
      <button class="ok" onclick="saveProjNew('${advId}')">추가</button>
      <button onclick="document.getElementById('padd-${advId}').innerHTML=''">취소</button>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('proj-inp-'+advId)?.focus(),10);
}
function saveProjNew(advId){
  const name=gv('proj-inp-'+advId);if(!name)return;
  if(!S.advs[advId].projects)S.advs[advId].projects={};
  const id=uid();S.advs[advId].projects[id]={id,name,campaigns:[]};
  document.getElementById('padd-'+advId).innerHTML='';
  sv();rNav();selProj(advId,id);
}
function editProj(advId,pid){
  const proj=S.advs[advId]?.projects?.[pid];if(!proj)return;
  const n=prompt('프로젝트 이름 변경:',proj.name);
  if(!n||n===proj.name)return;
  proj.name=n;sv();rNav();
  if(cAdv===advId&&cProj===pid){
    const adv=S.advs[advId];
    document.getElementById('bc').innerHTML=`<span class="b1">${adv.name}</span> › <span class="b2">${n}</span>`;
  }
}
function delProj(advId,pid){
  const proj=S.advs[advId]?.projects?.[pid];if(!proj)return;
  if(!confirm(`"${proj.name}" 프로젝트를 삭제할까요?`))return;
  delete S.advs[advId].projects[pid];
  if(cAdv===advId&&cProj===pid){cProj=null;showPH();}
  sv();rNav();
}
function selProj(advId,pid){
  cAdv=advId;cProj=pid;
  advOp[advId]=true;
  rNav();
  const adv=S.advs[advId],proj=adv.projects[pid];
  cTab='gt';
  document.getElementById('mhd').style.display='flex';
  document.getElementById('bc').innerHTML=`<span class="b1">${adv.name}</span> › <span class="b2">${proj.name}</span>`;
  document.getElementById('mt').textContent=proj.name;
  updSub();rContent();
}
function updSub(){
  const p=getProj();if(!p)return;
  const c=(p.campaigns||[]).length,g=(p.campaigns||[]).reduce((s,c)=>s+(c.groups||[]).length,0),a=(p.campaigns||[]).reduce((s,c)=>(c.groups||[]).reduce((s2,g)=>s2+(g.ads||[]).length,s),0);
  document.getElementById('ms').textContent=`캠페인 ${c}개 · 광고그룹 ${g}개 · 광고 ${a}개`;
}
function showPH(){
  document.getElementById('mhd').style.display='none';
  document.getElementById('ct').innerHTML='<div class="ph"><div class="phi"><div class="ico">📅</div><p>광고주 › 프로젝트를 선택하세요</p><span>왼쪽에서 광고주를 추가하고 프로젝트를 선택하면 스케줄 관리를 시작합니다</span></div></div>';
}

// ── TAB ──
function setTab(t){
  cTab=t;

  // 모든 dd-item 에서 on 제거
  document.querySelectorAll('.tab-dd-item').forEach(el=>el.classList.remove('on'));
  // 모든 tab-group-btn 에서 on 제거  
  document.querySelectorAll('.tab-group-btn').forEach(el=>el.classList.remove('on'));
  // tab-gt 버튼 on/off
  const gtBtn=document.getElementById('tab-gt');
  if(gtBtn)gtBtn.classList.toggle('on', t==='gt');

  // 드롭다운 아이템 활성화
  const activeItem=document.getElementById('tab-'+t);
  if(activeItem){
    activeItem.classList.add('on');
    // 부모 그룹 버튼도 on
    const groupBtn=activeItem.closest('.tab-group')?.querySelector('.tab-group-btn');
    if(groupBtn)groupBtn.classList.add('on');
  }

  rContent();
}

function rContent(){
  const ct=document.getElementById('ct');
  if(!ct)return;
  if(cTab==='s')ct.innerHTML='<div class="tp" id="tp"></div><div class="lp" id="lp"></div>';
  else if(cTab==='t')ct.innerHTML='<div style="flex:1;overflow-y:auto;padding:12px" id="tp"></div>';
  else if(cTab==='ck')ct.innerHTML='<div style="flex:1;overflow-y:auto;padding:12px" id="ck-pane"></div>';
  else if(cTab==='dh')ct.innerHTML='<div style="flex:1;overflow-y:auto;padding:12px" id="dh-pane"></div>';
  else if(cTab==='sg')ct.innerHTML='<div style="flex:1;overflow-y:auto;padding:12px" id="sg-pane"></div>';
  else if(cTab==='cs')ct.innerHTML='<div style="flex:1;overflow-y:auto;padding:14px 20px" id="cs-pane"></div>';
  else if(cTab==='gt')ct.innerHTML='<div style="flex:1;overflow-y:auto;padding:14px 20px" id="gt-pane"></div>';
  else if(cTab==='mm')ct.innerHTML='<div style="flex:1;overflow-y:auto;padding:14px 20px" id="mm-pane"></div>';
  else ct.innerHTML='<div style="flex:1;overflow-y:auto;padding:12px" id="lp"></div>';
  const tp=document.getElementById('tp');if(tp)rTree(tp);
  const lp=document.getElementById('lp');if(lp)rList(lp);
  const ck=document.getElementById('ck-pane');if(ck)rChecklist(ck);
  const dh=document.getElementById('dh-pane');if(dh)rDashboard(dh);
  const sg=document.getElementById('sg-pane');if(sg)rSettingGuide(sg);
  const cs=document.getElementById('cs-pane');if(cs)rCampStatus(cs);
  const gt=document.getElementById('gt-pane');if(gt)rGantt(gt);
  const mm=document.getElementById('mm-pane');if(mm)rMediaMix(mm);
}

// ── CAMPAIGN TREE ──
function rTree(con){
  const proj=getProj();if(!proj)return;
  const camps=proj.campaigns||[];
  let h='<div class="tw">';
  camps.forEach(camp=>{
    const co=op[camp.id]!==false,dr=isDr(camp.fields);
    h+=`<div class="cc${dr?' dr':''}">
      <div class="chd" onclick="tog('${camp.id}','c')">
        <span class="ld lc"></span><span class="bdg bc_">C</span>
        <span class="cn" title="${camp.name||'미완성'}">${camp.name||'(미완성 캠페인)'}</span>
        ${dr?'<span class="dtag">draft</span>':''}
        <span class="bdg bn_">${(camp.groups||[]).length}G</span>
        <div class="has" onclick="event.stopPropagation()">
          <button class="ib" onclick="oCF('${camp.id}','e')">✎ 수정</button>
          <button class="ib sv" onclick="oSV('${camp.id}')">🔗 세팅뷰</button>
          <button class="ib ld_" onclick="oLoad('c','${camp.id}')">불러오기</button>
          <button class="ib del" onclick="dCamp('${camp.id}')">✕</button>
        </div>
        <span class="ex${co?' op':''}">▶</span>
      </div>
      <div class="cb${co?' op':''}" id="cb-${camp.id}">
        <div class="curl-bar">
          <label>캠페인 기본 URL</label>
          <input type="text" id="curl-${camp.id}" placeholder="https://example.com" value="${camp.baseUrl||''}" onkeydown="if(event.key==='Enter')setCURL('${camp.id}')">
          <button onclick="setCURL('${camp.id}')">적용</button>
        </div>
        <div class="gl">`;
    (camp.groups||[]).forEach(grp=>{
      const go=op[grp.id]!==false,gdr=isDr(grp.fields);
      h+=`<div class="gc${gdr?' dr':''}">

let lI=[],lT='',lRg=[];
function oLoad(type,...args){
  lT=type;lRg=args;
  const titles={c:'캠페인 불러오기',g:'광고그룹 불러오기',a:'광고 불러오기'};
  document.getElementById('lt').textContent=titles[type]+' (복사)';
  let items=[];
  Object.values(S.advs).forEach(adv=>Object.values(adv.projects||{}).forEach(proj=>{
    if(type==='c')(proj.campaigns||[]).forEach(c=>items.push({label:c.name||'미완성',sub:`${adv.name} › ${proj.name}`,data:JSON.parse(JSON.stringify(c))}));
    else if(type==='g')(proj.campaigns||[]).forEach(c=>(c.groups||[]).forEach(g=>items.push({label:g.name||'미완성',sub:`${adv.name} › ${proj.name} › ${c.name||'미완성'}`,data:JSON.parse(JSON.stringify(g))})));
    else(proj.campaigns||[]).forEach(c=>(c.groups||[]).forEach(g=>(g.ads||[]).forEach(a=>items.push({label:a.name||'미완성',sub:`${adv.name} › ${g.name||'미완성'}`,data:JSON.parse(JSON.stringify(a))}))));
  }));
  lI=items;document.getElementById('lq').value='';rPick(items);document.getElementById('lm').style.display='flex';
}
function rPick(items){
  const el=document.getElementById('pl');
  if(!items.length){el.innerHTML='<div class="empty">불러올 항목이 없습니다</div>';return;}
  el.innerHTML=items.map((it,i)=>`<div class="pr" onclick="dLoad(${i})"><span class="pn" title="${it.label}">${it.label}</span><span class="pi">${it.sub}</span></div>`).join('');
}
function fp(){const q=gv('lq').toLowerCase();const fi=lI.filter(it=>(it.label+it.sub).toLowerCase().includes(q));rPick(fi);document.querySelectorAll('.pr').forEach((r,i)=>{r.onclick=()=>dLoadItem(fi[i]);});}
function dLoad(i){dLoadItem(lI[i]);}
function dLoadItem(item){
  if(!item)return;
  const d=JSON.parse(JSON.stringify(item.data));d.id=uid();
  if(lT==='c'){
    (d.groups||[]).forEach(g=>{g.id=uid();(g.ads||[]).forEach(a=>a.id=uid());});
    const p=getProj();if(!p.campaigns)p.campaigns=[];p.campaigns.push(d);op[d.id]=true;
  } else if(lT==='g'){
    (d.ads||[]).forEach(a=>a.id=uid());
    const c=getCamp(lRg[0]);if(!c.groups)c.groups=[];c.groups.push(d);op[d.id]=true;
  } else {
    const gid=lRg[1];
    if(gid&&document.getElementById('af-'+gid)){
      const f=d.fields||{};
      ['dt','pr','ap','at','ra','sc','nu'].forEach((k,i)=>{const keys=['date','product','appeal','adtype','ratio','sec','num'];const el=document.getElementById('af-'+k);if(el)el.value=f[keys[i]]||'';});
      const ul=document.getElementById('af-ul');if(ul)ul.value=d.url||'';
      uAP();cm('lm');return;
    }
    if(gid){const g=getGrp(lRg[0],gid);if(!g.ads)g.ads=[];g.ads.push(d);}
  }
  sv();updSub();rContent();cm('lm');
}

function scp(btn,enc){navigator.clipboard.writeText(decodeURIComponent(enc)).then(()=>{btn.classList.add('ok');btn.textContent='✓';setTimeout(()=>{btn.classList.remove('ok');btn.textContent='복사';},1800);});}
function scpp(btn,enc){const u=decodeURIComponent(enc),i=u.indexOf('?');if(i<0)return;navigator.clipboard.writeText(u.slice(i+1)).then(()=>{btn.classList.add('ok');btn.textContent='✓';setTimeout(()=>{btn.classList.remove('ok');btn.textContent='파라미터만';},1800);});}
function cpAll(btn,arr){navigator.clipboard.writeText(arr.join('\n')).then(()=>{btn.textContent=`✓ 복사됨 (${arr.length}개)`;setTimeout(()=>{btn.textContent=`📋 전체 UTM URL 복사 (${arr.length}개)`;},2000);});}

function checkAll(val){
  const proj=getProj();if(!proj)return;
  if(!S.done)S.done={};
  (proj.campaigns||[]).forEach(c=>{
    if(!(c.groups||[]).length){S.done[rowKey(c.id,'','')]=val;}
    (c.groups||[]).forEach(g=>{
      if(!(g.ads||[]).length){S.done[rowKey(c.id,g.id,'')]=val;}
      (g.ads||[]).forEach(a=>{S.done[rowKey(c.id,g.id,a.id)]=val;});
    });
  });
  sv();rContent();
}

function filt(){
  const q=(gv('lsq')||'').toLowerCase();
  const f=document.getElementById('lsf')?.value||'';
  document.querySelectorAll('#ltb tr').forEach(tr=>{
    const mq=!q||(tr.dataset.q||'').includes(q);
    const mf=!f||(f==='done'?tr.dataset.done==='done':tr.dataset.done==='yet');
    tr.style.display=(mq&&mf)?'':'none';
  });
}
function cr(btn,enc){navigator.clipboard.writeText(decodeURIComponent(enc)).then(()=>{btn.classList.add('ok');btn.textContent='✓';setTimeout(()=>{btn.classList.remove('ok');btn.textContent=btn.textContent==='✓'?'URL':btn.textContent;},1800);});}
function expCSV(){
  const proj=getProj(),adv=S.advs[cAdv];if(!proj)return;
  if(!S.done)S.done={};
  const header=['광고주','프로젝트','캠페인명','광고그룹명','광고명','소스','매체','랜딩URL','UTM URL','세팅완료'];
  const rows=[header];
  (proj.campaigns||[]).forEach(c=>{
    const hasGroups=(c.groups||[]).length>0;
    if(!hasGroups){
      const key=rowKey(c.id,'','');
      rows.push([adv.name,proj.name,c.name||'','-','-',c.fields?.src||'',c.fields?.med||'','','',S.done[key]?'완료':'미완']);
    }
    (c.groups||[]).forEach(g=>{
      const hasAds=(g.ads||[]).length>0;
      if(!hasAds){
        const key=rowKey(c.id,g.id,'');
        rows.push([adv.name,proj.name,c.name||'',g.name||'','-',c.fields?.src||'',c.fields?.med||'','','',S.done[key]?'완료':'미완']);
      }
      (g.ads||[]).forEach(a=>{
        const eu=a.url||c.baseUrl||'';
        const utm=bU(eu,c.name,g.name,a.name,c.fields?.src,c.fields?.med);
        const key=rowKey(c.id,g.id,a.id);
        rows.push([adv.name,proj.name,c.name||'',g.name||'',a.name||'',c.fields?.src||'',c.fields?.med||'',eu,utm,S.done[key]?'완료':'미완']);
      });
    });
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const el=document.createElement('a');
  const filename=`${adv.name}_${proj.name}_utm_${new Date().toISOString().slice(0,10)}.csv`;
  // BOM + UTF-8 인코딩, atob 미사용 방식
  try {
    const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    el.href = url;
    el.download = filename;
    document.body.appendChild(el);
    el.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); document.body.removeChild(el); }, 200);
  } catch(e) {
    // 최후 수단: textarea로 복사 유도
    const ta = document.createElement('textarea');
    ta.value = '\uFEFF' + csv;
    ta.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:200px;z-index:9999;font-size:11px;';
    ta.setAttribute('readonly','');
    document.body.appendChild(ta);
    ta.select();
    alert('다운로드가 차단되었습니다.\n위 텍스트를 복사해서 .csv 파일로 저장해주세요.\n(Ctrl+A → Ctrl+C 후 메모장에 붙여넣기)');
  }
}

function clKey(cid,gid,aid){return `${cAdv}__${cProj}__${cid}__${gid||''}__${aid||''}`;}

function getClItem(key){
  if(!S.cl[key])S.cl[key]={fields:{},done:{},meta:{}};
  if(!S.cl[key].meta)S.cl[key].meta={};
  return S.cl[key];
}
function saveClMeta(key,field,val){
  if(!S.cl)S.cl={};
  if(!S.cl[key])S.cl[key]={fields:{},done:{},meta:{}};

  S.cl[key].meta[field]=val;

// ── 공통 인풋 헬퍼 ──
function clInp(key, field, placeholder, val, extraCss){
  var v=val!==undefined?val:'';
  var ecs=extraCss||'';
  return '<input type="text" value="'+v.replace(/"/g,'&quot;')+'" placeholder="'+placeholder+'"'
    +' style="width:100%;font-size:11px;padding:6px 9px;border:1px solid #dde1e7;border-radius:5px;background:#fff;color:#1c1f26;'+ecs+'"'
    +' oninput="saveClField(\''+key+'\',\''+field+'\',this.value)'+( field==='budget_gross'?';updNet(\''+key+'\')':'')+'">';
}
function clSel(key, field, opts, val){
  var v=val!==undefined?val:'';
  var h='<select style="width:100%;font-size:11px;padding:6px 9px;border:1px solid #dde1e7;border-radius:5px;background:#fff;color:#1c1f26"'
    +' onchange="saveClField(\''+key+'\',\''+field+'\',this.value)'+(field==='markup_formula'?';updNet(\''+key+'\')':'')+'">';
  h+='<option value="">선택</option>';
  opts.forEach(function(o){h+='<option value="'+o+'"'+(v===o?' selected':'')+'>'+o+'</option>';});
  h+='</select>';
  return h;
}
function clTa(key, field, placeholder, val, rows){
  var v=val!==undefined?val:'';
  return '<textarea rows="'+(rows||2)+'"'
    +' style="width:100%;font-size:11px;padding:6px 9px;border:1px solid #dde1e7;border-radius:5px;background:#fff;color:#1c1f26;resize:vertical"'
    +' placeholder="'+placeholder+'"'
    +' oninput="saveClField(\''+key+'\',\''+field+'\',this.value)">'+v+'</textarea>';
}
function clCol(label, inputHtml, span){
  return '<div style="display:flex;flex-direction:column;gap:4px'+(span?';grid-column:span '+span:'')+'">'
    +'<label style="font-size:10px;font-weight:600;color:#64748b">'+label+'</label>'
    +inputHtml
  +'</div>';
}
function clGrid(cols, inner){
  return '<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:10px;margin-bottom:10px">'+inner+'</div>';
}
function clNetBox(key, f){
  var gross=f.budget_gross||'', mup=f.markup||'', formula=f.markup_formula||'';
  var net='—';
  var g=parseFloat((gross||'').replace(/,/g,''));
  var m=parseFloat(mup||0)/100;
  if(!isNaN(g)&&g>0&&!isNaN(m)&&m>0&&m<1&&formula){
    var n=formula.indexOf('산술식2')>=0?g/(1+m):g/(1-m);
    net=Math.round(n).toLocaleString()+'원';
  }
  return '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:5px;padding:8px 10px;display:flex;flex-direction:column;gap:3px">'
    +'<label style="font-size:10px;font-weight:600;color:#15803d">총 예산 Net (자동계산)</label>'
    +'<div id="net-'+key+'" style="font-size:14px;font-weight:700;color:#15803d">'+net+'</div>'
    +'<div id="netfm-'+key+'" style="font-size:9px;color:#6b7280">'+(formula&&mup&&gross?'Gross ÷ ('+(formula.indexOf('산술식2')>=0?'1+':'1-')+mup+'%)':'')+'</div>'
  +'</div>';
}

// ── 캠페인 폼 ──
function rClCampForm(key, camp){
  var item=getClItem(key);
  var f=item.fields||{};
  var ds=f.date_start||'', de=f.date_end||'';
  var dayStr='';
  if(ds&&de){var dd=Math.ceil((new Date(de)-new Date(ds))/86400000)+1;if(dd>0)dayStr='('+dd+'일)';}

  var h='';
  h+=clGrid(4,
    clCol('상품', clInp(key,'product','예: 브랜드편, 비교분석편',f.product))
    +clCol('디바이스', clInp(key,'device','예: 전체, 모바일, PC/MO',f.device))
    +clCol('예산 기준', clSel(key,'budget_unit',['캠페인 단위','광고그룹 단위'],f.budget_unit))
    +clCol('총 예산 Gross', clInp(key,'budget_gross','예: 5000000',f.budget_gross))
  );
  // 기간
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 120px 1fr 1fr;gap:10px;margin-bottom:10px;align-items:end">';
  h+=clCol('시작일', '<input type="date" value="'+ds+'" id="ds-ck-'+key+'" style="width:100%;font-size:11px;padding:6px 9px;border:1px solid #dde1e7;border-radius:5px;background:#fff;color:#1c1f26" oninput="saveClField(\''+key+'\',\'date_start\',this.value);updDays(\''+key+'\',this.value,document.getElementById(\'de-ck-'+key+'\').value)">');
  h+=clCol('종료일', '<input type="date" value="'+de+'" id="de-ck-'+key+'" style="width:100%;font-size:11px;padding:6px 9px;border:1px solid #dde1e7;border-radius:5px;background:#fff;color:#1c1f26" oninput="saveClField(\''+key+'\',\'date_end\',this.value);updDays(\''+key+'\',document.getElementById(\'ds-ck-'+key+'\').value,this.value)">');
  h+='<div style="display:flex;flex-direction:column;gap:4px"><label style="font-size:10px;font-weight:600;color:#64748b">일수</label>'
    +'<div id="ddays-'+key+'" style="font-size:14px;font-weight:700;color:var(--bl);padding:6px 0">'+dayStr+'</div></div>';
  h+=clCol('마크업 (%)', '<input type="number" min="0" max="100" value="'+(f.markup||'')+'" placeholder="예: 20" style="width:100%;font-size:11px;padding:6px 9px;border:1px solid #dde1e7;border-radius:5px;background:#fff;color:#1c1f26" oninput="saveClField(\''+key+'\',\'markup\',this.value);updNet(\''+key+'\')">');
  h+=clCol('Net 산출식', clSel(key,'markup_formula',['산술식1: Gross÷(1-마크업)','산술식2: Gross÷(1+마크업)'],f.markup_formula));
  h+='</div>';
  h+=clGrid(1, clCol('총 예산 Net', clNetBox(key,f)));
  h+=clGrid(1, clCol('메모', clTa(key,'campaign_note','캠페인 관련 메모, 특이사항...',f.campaign_note,2)));

  );

function updNet(key){
  var item=getClItem(key);
  var f=item.fields||{};
  var gross=f.budget_gross||'';
  var mup=f.markup||'';
  var formula=f.markup_formula||'';
  var g=parseFloat((gross||'').replace(/,/g,''));
  var m=parseFloat(mup||0)/100;
  var net='—', fmStr='';
  if(!isNaN(g)&&g>0&&!isNaN(m)&&m>0&&m<1&&formula){
    var n=formula.indexOf('산술식2')>=0?g/(1+m):g/(1-m);
    net=Math.round(n).toLocaleString()+'원';
    fmStr='Gross('+gross+') ÷ ('+(formula.indexOf('산술식2')>=0?'1+':'1-')+mup+'%)';
  }
  var el=document.getElementById('net-'+key);if(el)el.textContent=net;
  var el2=document.getElementById('netfm-'+key);if(el2)el2.textContent=fmStr;
}

function updDays(key,ds,de){
  var el=document.getElementById('ddays-'+key);
  if(!el)return;
  if(ds&&de){
    var d=Math.ceil((new Date(de)-new Date(ds))/86400000)+1;
    el.textContent=d>0?'('+d+'일)':'';
  } else {
    el.textContent='';
  }
}

function calcNetVal(gross,mup,formula){
  var g=parseFloat((gross||'').replace(/,/g,''));
  var m=parseFloat(mup||0)/100;
  if(isNaN(g)||g<=0||isNaN(m)||m<=0||m>=1||!formula)return'';
  var n=formula.indexOf('산술식2')>=0?g/(1+m):g/(1-m);
  return isNaN(n)?'':Math.round(n).toLocaleString()+'원';
}

function calcDays(s,e){
  if(!s||!e)return'';
  var d=Math.ceil((new Date(e)-new Date(s))/86400000)+1;
  return d>0?'('+d+'일)':'';
}

}

function selSGCamp(cid){const con=document.getElementById('sg-pane');if(con){con._selCamp=cid;rSettingGuide(con);}}
function sgCp(btn,enc){
  navigator.clipboard.writeText(decodeURIComponent(enc)).then(()=>{
    const t=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=t,1500);
  });
}


// ── 세팅현황 대시보드 ──────────────────────────────
function rDashboard(con){
  const proj=getProj();
  if(!proj){con.innerHTML='<div style="padding:30px;text-align:center;color:var(--tx3)">프로젝트를 선택해주세요</div>';return;}
  if(!S.sg)S.sg={};if(!S.cl)S.cl={};if(!S.done)S.done={};
  const adv=S.advs[cAdv];
  const camps=proj.campaigns||[];

  // 전체 수치 계산
  let clC_tot=0,clC_done=0,clG_tot=0,clG_done=0,clA_tot=0,clA_done=0;
  let sgC_tot=0,sgC_done=0,sgG_tot=0,sgG_done=0,sgA_tot=0,sgA_done=0;
  let utm_tot=0,utm_done=0;

  const campRows=[];
  camps.forEach(camp=>{
    // UTM 완료
    (camp.groups||[]).forEach(g=>(g.ads||[]).forEach(a=>{
      utm_tot++;
      const rk=`${cAdv}__${cProj}__${camp.id}__${g.id}__${a.id}`;
      if(S.done[rk])utm_done++;
    }));

    // 체크리스트(요청) 완료율
    const ck=clKey(camp.id,'','');
    const ci=getClItem(ck);
    const cCldone=CL_CAMP_FIELDS.filter(f=>ci.done[f.k]).length;
    clC_tot+=CL_CAMP_FIELDS.length; clC_done+=cCldone;

    // 세팅가이드(담당자 회신) 완료율
    const csg=getSG('c',camp.id);
    const cSgDone=SG_CAMP_CHECKS.filter((_,i)=>csg.checked[i]).length;
    sgC_tot+=SG_CAMP_CHECKS.length; sgC_done+=cSgDone;

    let row_clG=0,row_clGt=0,row_clA=0,row_clAt=0;
    let row_sgG=0,row_sgGt=0,row_sgA=0,row_sgAt=0;

    (camp.groups||[]).forEach(g=>{
      const gk=clKey(camp.id,g.id,'');
      const gi=getClItem(gk);
      const gCld=CL_GRP_FIELDS.filter(f=>gi.done[f.k]).length;
      clG_tot+=CL_GRP_FIELDS.length;clG_done+=gCld;
      row_clGt+=CL_GRP_FIELDS.length;row_clG+=gCld;

      const gsg=getSG('g',g.id);
      const gSgD=SG_GRP_CHECKS.filter((_,i)=>gsg.checked[i]).length;
      sgG_tot+=SG_GRP_CHECKS.length;sgG_done+=gSgD;
      row_sgGt+=SG_GRP_CHECKS.length;row_sgG+=gSgD;

      (g.ads||[]).forEach(a=>{
        const ak=clKey(camp.id,g.id,a.id);
        const ai=getClItem(ak);
        const aCld=CL_AD_FIELDS.filter(f=>ai.done[f.k]).length;
        clA_tot+=CL_AD_FIELDS.length;clA_done+=aCld;
        row_clAt+=CL_AD_FIELDS.length;row_clA+=aCld;

        const asg=getSG('a',a.id);
        const aSgD=SG_AD_CHECKS.filter((_,i)=>asg.checked[i]).length;
        sgA_tot+=SG_AD_CHECKS.length;sgA_done+=aSgD;
        row_sgAt+=SG_AD_CHECKS.length;row_sgA+=aSgD;
      });
    });

    campRows.push({
      name:camp.name||'(미완성)',
      grps:(camp.groups||[]).length,
      ads:(camp.groups||[]).reduce((s,g)=>s+(g.ads||[]).length,0),
      clC:Math.round(cCldone/CL_CAMP_FIELDS.length*100),
      clG:row_clGt?Math.round(row_clG/row_clGt*100):0,
      clA:row_clAt?Math.round(row_clA/row_clAt*100):0,
      sgC:Math.round(cSgDone/SG_CAMP_CHECKS.length*100),
      sgG:row_sgGt?Math.round(row_sgG/row_sgGt*100):0,
      sgA:row_sgAt?Math.round(row_sgA/row_sgAt*100):0,
    });
  });

  const pct=(d,t)=>t?Math.round(d/t*100):0;
  const bar=(p,c,w=70)=>`<div style="display:flex;align-items:center;gap:5px">
    <div style="width:${w}px;height:5px;background:var(--sf3);border-radius:3px;overflow:hidden;flex-shrink:0">
      <div style="width:${p}%;height:100%;background:${c};border-radius:3px"></div>
    </div>
    <span style="font-size:10px;font-weight:600;color:${c};min-width:32px">${p}%</span>
  </div>`;

  const kpiCard=(icon,title,color,p,d,t,sub)=>`
    <div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px">
      <div style="font-size:10px;font-weight:600;color:var(--tx3);margin-bottom:6px">${icon} ${title}</div>
      <div style="font-size:11px;color:var(--tx3);margin-bottom:10px">${sub}</div>
      <div style="font-size:28px;font-weight:700;color:${color};margin-bottom:8px">${p}<span style="font-size:14px">%</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:6px;background:var(--sf3);border-radius:3px;overflow:hidden">
          <div style="width:${p}%;height:100%;background:${color};border-radius:3px"></div>
        </div>
        <span style="font-size:10px;color:var(--tx3);white-space:nowrap">${d}/${t}</span>
      </div>
    </div>`;

  const clPct=pct(clC_done+clG_done+clA_done, clC_tot+clG_tot+clA_tot);
  const sgPct=pct(sgC_done+sgG_done+sgA_done, sgC_tot+sgG_tot+sgA_tot);
  const utmPct=pct(utm_done,utm_tot);
  const overall=Math.round((clPct+sgPct+utmPct)/3);

  let h=`<div style="max-width:none">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <div>
      <h2 style="font-size:15px;font-weight:700;margin-bottom:2px">📊 세팅현황 대시보드</h2>
      <p style="font-size:11px;color:var(--tx3)">${adv.name} › ${proj.name} — 전체 세팅 진행률을 한눈에 확인하세요</p>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span style="font-size:11px;color:var(--tx2);font-weight:500">전체 완료율</span>
      <div style="width:120px;height:8px;background:var(--sf3);border-radius:4px;overflow:hidden">
        <div style="width:${overall}%;height:100%;background:var(--pu);border-radius:4px"></div>
      </div>
      <span style="font-size:18px;font-weight:700;color:var(--pu)">${overall}%</span>
    </div>
  </div>

  <!-- 개념 설명 배너 -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
    <div style="background:var(--am-bg);border:1px solid var(--am-lt);border-radius:var(--r);padding:10px 14px">
      <div style="font-size:11px;font-weight:700;color:var(--am);margin-bottom:3px">✅ 세팅 체크리스트</div>
      <div style="font-size:10px;color:var(--tx2)">운영자/기획자가 담당자에게 전달하는 <strong>요청서</strong></div>
      <div style="font-size:10px;color:var(--tx3);margin-top:4px">광고 목적, 예산, 소재 등 세팅 항목 정의</div>
    </div>
    <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:var(--r);padding:10px 14px">
      <div style="font-size:11px;font-weight:700;color:#0891b2;margin-bottom:3px">🗂 세팅 가이드</div>
      <div style="font-size:10px;color:var(--tx2)">담당자가 실세팅 후 항목별 완료 <strong>회신 시트</strong></div>
      <div style="font-size:10px;color:var(--tx3);margin-top:4px">UTM 파라미터 확인 + 체크박스 완료 처리</div>
    </div>
    <div style="background:var(--pu-lt);border:1px solid #ddd6fe;border-radius:var(--r);padding:10px 14px">
      <div style="font-size:11px;font-weight:700;color:var(--pu);margin-bottom:3px">📊 세팅현황</div>
      <div style="font-size:10px;color:var(--tx2)">요청 → 회신 전체 진행률 <strong>대시보드</strong></div>
      <div style="font-size:10px;color:var(--tx3);margin-top:4px">캠페인별 3단계 완료율 한눈에 파악</div>
    </div>
  </div>

  <!-- KPI 카드 3개 -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
    ${kpiCard('✅','세팅 체크리스트 완료율','var(--am)',clPct,clC_done+clG_done+clA_done,clC_tot+clG_tot+clA_tot,'운영자 요청 항목 입력률')}
    ${kpiCard('🗂','세팅 가이드 완료율','#0891b2',sgPct,sgC_done+sgG_done+sgA_done,sgC_tot+sgG_tot+sgA_tot,'담당자 세팅 완료 체크율')}
    ${kpiCard('🔗','UTM 세팅완료율','var(--pu)',utmPct,utm_done,utm_tot,'UTM 리스트 완료 체크율')}
  </div>

// ══════════════════════════════════════════════════════
// 📋 캠페인 세팅 현황표 (rCampStatus)
// ══════════════════════════════════════════════════════
function rCampStatus(con){
  var proj=getProj();
  if(!proj){con.innerHTML='<div style="padding:30px;text-align:center;color:var(--tx3)">프로젝트를 선택해주세요</div>';return;}
  if(!S.cl)S.cl={};if(!S.sg)S.sg={};
  var adv=S.advs[cAdv];
  var camps=proj.campaigns||[];
  if(!camps.length){con.innerHTML='<div style="padding:30px;text-align:center;color:var(--tx3)">캠페인을 먼저 추가해주세요</div>';return;}

  function calcNet(gross,mup,formula){
    var g=parseFloat((gross||'').replace(/,/g,''));
    var m=parseFloat(mup||0)/100;
    if(isNaN(g)||g<=0||isNaN(m)||m<=0||m>=1||!formula)return'';
    var n=formula.indexOf('산술식2')>=0?g/(1+m):g/(1-m);
    return isNaN(n)?'':Math.round(n).toLocaleString();
  }

  var rows=[];
  camps.forEach(function(camp){
    var cf_=camp.fields||{};
    var ck=clKey(camp.id,'','');
    var ci=getClItem(ck);var cf=ci.fields||{};var cm=ci.meta||{};
    var sgCm=getSG('c',camp.id).meta||{};
    var platform=cm.platform||sgCm.platform||cf_.src||'';
    var medium=cf_.med||'';
    var manager=cm.manager||sgCm.manager||'';
    var reqStatus=cm.reqStatus||'';
    var campGross=cf.budget_gross?parseInt((cf.budget_gross||'0').replace(/,/g,'')).toLocaleString():'';
    var campNet=calcNet(cf.budget_gross,cf.markup,cf.markup_formula);
    var period='',periodDays='';
    if(cf.date_start&&cf.date_end){
      period=cf.date_start+' ~ '+cf.date_end;
      var dd=Math.ceil((new Date(cf.date_end)-new Date(cf.date_start))/86400000)+1;
      if(dd>0)periodDays=dd+'일';
    }
    (camp.groups||[]).forEach(function(grp){
      var gk=clKey(camp.id,grp.id,'');
      var gi=getClItem(gk);var gf=gi.fields||{};
      var sgGm=getSG('g',grp.id).meta||{};
      (grp.ads||[]).forEach(function(ad){
        var ak=clKey(camp.id,grp.id,ad.id);
        var ai_=getClItem(ak);var af=ai_.fields||{};
        var sgAm=getSG('a',ad.id).meta||{};
        var dailyGross='',dailyNet='';
        if(cf.budget_gross&&cf.date_start&&cf.date_end){
          var dd2=Math.ceil((new Date(cf.date_end)-new Date(cf.date_start))/86400000)+1;
          if(dd2>0){
            var g2=parseInt((cf.budget_gross||'0').replace(/,/g,''));
            dailyGross=Math.round(g2/dd2).toLocaleString();
            if(campNet)dailyNet=Math.round(parseInt(campNet.replace(/,/g,''))/dd2).toLocaleString();
          }
        }
        rows.push({
          platform:platform,medium:medium,
          campName:camp.name||'(미완성)',device:cf.device||'',
          grpName:grp.name||'(미완성)',target:gf.audience_type||'',
          adName:ad.name||'(미완성)',creativeType:af.creative_format||'',
          period:period,periodDays:periodDays,
          budgetGross:campGross,budgetNet:campNet,
          dailyGross:dailyGross,dailyNet:dailyNet,
          sgCStatus:sgCm.status||'',sgGStatus:sgGm.status||'',sgAStatus:sgAm.status||'',
          manager:manager,reqStatus:reqStatus,
          utmUrl:bU(ad.url||camp.baseUrl||'',camp.name,grp.name,ad.name,cf_.src,cf_.med),
          cid:camp.id,gid:grp.id,aid:ad.id,
        });
      });
      if(!(grp.ads||[]).length){
        var sgGm2=getSG('g',grp.id).meta||{};
        rows.push({platform:platform,medium:medium,campName:camp.name||'(미완성)',device:cf.device||'',
          grpName:grp.name||'(미완성)',target:gf.audience_type||'',adName:'—',creativeType:'',
          period:period,periodDays:periodDays,budgetGross:campGross,budgetNet:campNet,
          dailyGross:'',dailyNet:'',sgCStatus:sgCm.status||'',sgGStatus:sgGm2.status||'',sgAStatus:'',
          manager:manager,reqStatus:reqStatus,utmUrl:'',cid:camp.id,gid:grp.id,aid:''});
      }
    });
    if(!(camp.groups||[]).length){
      rows.push({platform:platform,medium:medium,campName:camp.name||'(미완성)',device:cf.device||'',
        grpName:'—',target:'',adName:'—',creativeType:'',
        period:period,periodDays:periodDays,budgetGross:campGross,budgetNet:campNet,
        dailyGross:'',dailyNet:'',sgCStatus:sgCm.status||'',sgGStatus:'',sgAStatus:'',
        manager:manager,reqStatus:reqStatus,utmUrl:'',cid:camp.id,gid:'',aid:''});
    }
  });

  // ── 스타일 상수 (간트차트와 동일 톤) ──
  var C={
    hd:'#1e293b',      // 헤더 배경
    hd2:'#334155',     // 서브헤더
    hdTxt:'#e2e8f0',   // 헤더 텍스트
    hdTxt2:'#94a3b8',  // 서브헤더 텍스트
    hdBd:'#475569',    // 헤더 구분선
    rowBd:'#e8eaed',   // 행 구분선
    rowOdd:'#ffffff',  // 홀수 행
    rowEven:'#f8fafc', // 짝수 행
    green:'#16a34a',   // 완료 색상
    blue:'#2563eb',    // 강조
    amber:'#d97706',   // 요청중
    red:'#dc2626',     // 이슈
    purple:'#7c3aed',  // 보류
    gray:'#94a3b8',    // 미입력
  };

  function sgBadge(s_){
    if(!s_)return '<span style="color:'+C.gray+';font-size:10px">—</span>';
    var map={
      '완료':  {bg:'#dcfce7',c:C.green, icon:'✅'},
      '세팅중':{bg:'#dbeafe',c:C.blue,  icon:'🔵'},
      '이슈':  {bg:'#fee2e2',c:C.red,   icon:'🔴'},
      '보류':  {bg:'#fef9c3',c:C.amber, icon:'⏸'},
    };
    var st=map[s_]||{bg:'#f1f5f9',c:C.gray,icon:''};
    return '<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:'+st.bg+';color:'+st.c+';font-weight:600;white-space:nowrap;display:inline-block">'+st.icon+' '+s_+'</span>';
  }
  function reqBadge(s_){
    if(!s_)return '<span style="color:'+C.gray+';font-size:10px">—</span>';
    var map={'완료':C.green,'요청중':C.amber,'검토중':C.purple,'보류':C.gray};
    var col=map[s_]||C.gray;
    return '<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:'+col+'18;color:'+col+';font-weight:600;display:inline-block">'+s_+'</span>';
  }
  function td(v,extra){
    return '<td style="padding:7px 11px;border-right:1px solid '+C.rowBd+';border-bottom:1px solid '+C.rowBd+';font-size:11px;'+(extra||'')+'">'+( v||'<span style="color:'+C.gray+'">—</span>')+'</td>';
  }
  function tdc(v,extra){return td(v,'text-align:center;'+(extra||''));}
  function tdm(v){
    return '<td style="padding:7px 11px;border-right:1px solid '+C.rowBd+';border-bottom:1px solid '+C.rowBd+'">'
      +'<span style="display:block;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace;font-size:10px;color:#334155" title="'+v+'">'+(v||'<span style="color:'+C.gray+'">—</span>')+'</span></td>';
  }
  function thH(txt,rspan,cspan,extra){
    return '<th'+(rspan?' rowspan="'+rspan+'"':'')+' '+(cspan?'colspan="'+cspan+'"':'')+' style="padding:8px 11px;text-align:center;border-right:1px solid '+C.hdBd+';font-size:11px;font-weight:600;'+(extra||'')+'">'+(txt)+'</th>';
  }
  function thS(txt,extra){
    return '<th style="padding:5px 10px;text-align:center;border-right:1px solid '+C.hdBd+';font-size:10px;font-weight:600;'+(extra||'')+'">'+(txt)+'</th>';
  }

  var platforms=[...new Set(rows.map(function(r){return r.platform;}).filter(Boolean))];

  var h='<style>'
    +'.cs-toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px}'
    +'.cs-wrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--sh2);border:1px solid var(--bd)}'
    +'.cs-tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:1320px;white-space:nowrap}'
    +'.cs-tbl tbody tr:hover td{background:#eff6ff!important}'
    +'</style>';

  h+='<div class="cs-toolbar">';
  h+='<div>';
  h+='<h2 style="font-size:15px;font-weight:700;margin-bottom:2px">🗃 캠페인 세팅 현황표</h2>';
  h+='<p style="font-size:11px;color:var(--tx3)">'+adv.name+' › '+proj.name+' · 총 '+rows.length+'행 — 세팅 가이드 완료 상태 반영</p>';
  h+='</div>';
  h+='<div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">';
  h+='<input type="text" id="cs-search" placeholder="검색..." oninput="csFilter()"'
    +' style="font-size:11px;padding:5px 10px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--sf);color:var(--tx);width:180px">';
  h+='<select id="cs-platform" onchange="csFilter()" style="font-size:11px;padding:5px 8px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--sf);color:var(--tx)">';
  h+='<option value="">전체 플랫폼</option>';
  platforms.forEach(function(p){h+='<option value="'+p+'">'+p+'</option>';});
  h+='</select>';
  h+='<button onclick="csExport()" class="btn">↓ CSV</button>';
  h+='</div></div>';

  h+='<div class="cs-wrap"><table class="cs-tbl"><thead>';

  // 헤더 1행
  h+='<tr style="background:'+C.hd+';color:'+C.hdTxt+'">';
  h+=thH('플랫폼',2,0,'text-align:left;min-width:80px');
  h+=thH('매체',2,0,'text-align:left;min-width:65px');
  h+=thH('캠페인',0,2);
  h+=thH('광고그룹',0,2);
  h+=thH('광고소재',0,2);
  h+=thH('기간',2,0,'min-width:170px');
  h+=thH('총 예산',0,2);
  h+=thH('일 예산',0,2);
  h+=thH('세팅 완료 (가이드 기준)',0,3);
  h+=thH('담당자',2,0,'min-width:65px');
  h+='<th rowspan="2" style="padding:8px 11px;text-align:center;font-size:11px;font-weight:600;min-width:70px">요청상태</th>';
  h+='</tr>';

  // 헤더 2행
  h+='<tr style="background:'+C.hd2+';color:'+C.hdTxt2+'">';
  h+=thS('이름','text-align:left;min-width:165px');
  h+=thS('디바이스','min-width:70px');
  h+=thS('이름','text-align:left;min-width:155px');
  h+=thS('타겟유형','min-width:75px');
  h+=thS('이름','text-align:left;min-width:155px');
  h+=thS('형식','min-width:60px');
  h+=thS('GROSS','min-width:90px');
  h+=thS('NET','min-width:90px');
  h+=thS('GROSS','min-width:80px');
  h+=thS('NET','min-width:80px');
  h+=thS('캠페인','min-width:85px');
  h+=thS('광고그룹','min-width:85px');
  h+='<th style="padding:5px 10px;text-align:center;font-size:10px;font-weight:600;min-width:85px">광고</th>';
  h+='</tr>';
  h+='</thead><tbody id="cs-tbody">';

  rows.forEach(function(r,i){
    var bg=i%2===0?C.rowOdd:C.rowEven;
    h+='<tr data-q="'+(r.campName+r.grpName+r.adName+r.platform).toLowerCase()+'" data-platform="'+r.platform+'" style="background:'+bg+'">';
    h+=td(r.platform,'font-weight:500');
    h+=td(r.medium,'color:#475569');
    h+=tdm(r.campName);
    h+=tdc(r.device);
    h+=tdm(r.grpName);
    h+=tdc(r.target);
    h+=tdm(r.adName);
    h+=tdc(r.creativeType);
    // 기간
    if(r.period){
      h+='<td style="padding:7px 11px;border-right:1px solid '+C.rowBd+';border-bottom:1px solid '+C.rowBd+';min-width:170px">'
        +'<div style="font-size:10px;color:#475569;line-height:1.6">'+r.period+'</div>'
        +(r.periodDays?'<div style="font-size:11px;font-weight:700;color:'+C.blue+'">'+r.periodDays+'</div>':'')
        +'</td>';
    } else h+=td('');
    // 예산
    h+=tdc(r.budgetGross?'<span style="font-weight:600;color:#1e293b">'+r.budgetGross+'</span>':'');
    h+=tdc(r.budgetNet?'<span style="font-weight:700;color:'+C.green+'">'+r.budgetNet+'</span>':'');
    h+=tdc(r.dailyGross?'<span style="color:#475569">'+r.dailyGross+'</span>':'');
    h+=tdc(r.dailyNet?'<span style="color:'+C.green+'">'+r.dailyNet+'</span>':'');
    // 세팅 완료
    h+=tdc(sgBadge(r.sgCStatus));
    h+=tdc(sgBadge(r.sgGStatus));
    h+='<td style="padding:7px 11px;text-align:center;border-bottom:1px solid '+C.rowBd+'">'+sgBadge(r.sgAStatus)+'</td>';
    h+=tdc(r.manager?'<span style="font-size:11px;color:#334155">'+r.manager+'</span>':'');
    h+='<td style="padding:7px 11px;text-align:center;border-bottom:1px solid '+C.rowBd+'">'+reqBadge(r.reqStatus)+'</td>';
    h+='</tr>';
  });

  h+='</tbody></table></div>';
  con.innerHTML=h;
  con._rows=rows;
}

function csFilter(){
  const q=(document.getElementById('cs-search')?.value||'').toLowerCase();
  const pf=document.getElementById('cs-platform')?.value||'';
  document.querySelectorAll('#cs-tbody tr').forEach(tr=>{
    const mq=!q||tr.dataset.q?.includes(q);
    const mp=!pf||tr.dataset.platform===pf;
    tr.style.display=(mq&&mp)?'':'none';
  });
}

function csExport(){
  const proj=getProj(),adv=S.advs[cAdv];if(!proj)return;
  const con=document.getElementById('cs-pane');
  if(!con||!con._rows)return;
  const rows=con._rows;
  const header=['플랫폼','매체','캠페인명','디바이스','광고그룹명','타겟','광고명','소재형식','기간','총예산(Gross)','총예산(Net)','일예산(Gross)','일예산(Net)','체크_예산','체크_기간','체크_입찰','체크_잠재고객확장','체크_타겟','체크_소재','체크_게재빈도','담당자','상태','UTM URL'];
  const csv=[header,...rows.map(r=>[r.platform,r.medium,r.campName,r.device,r.grpName,r.checks.target?'V':'□',r.adName,r.creativeType,r.period,r.budgetGross,r.budgetNet,r.dailyGross,r.dailyNet,...Object.values(r.checks).map(v=>v?'V':'□'),r.manager,r.status,r.utmUrl])].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const el=document.createElement('a');
  const fname=`${adv.name}_${proj.name}_캠페인현황_${new Date().toISOString().slice(0,10)}.csv`;
  try{
    const blob=new Blob([new Uint8Array([0xEF,0xBB,0xBF]),csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    el.href=url;el.download=fname;document.body.appendChild(el);el.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(el);},200);
  }catch(e){alert('다운로드 실패');}
}

// 📅 간트차트 플래너 (rGantt)
// ══════════════════════════════════════════════════════
// S.gantt = { [advId__projId]: { tasks:[], milestone:{date,label} } }
if(!S.gantt)S.gantt={};

function ganttKey(){return `${cAdv}__${cProj}`;}
function getGanttData(){
  if(!cAdv||!cProj)return{tasks:[],milestone:{date:'',label:''}};
  const k=ganttKey();
  if(!S.gantt[k])S.gantt[k]={tasks:[],milestone:{date:'',label:''}};
  return S.gantt[k];
}

const GANTT_CATS=['Meta','Google Ads','DV360','YouTube','광고세팅','픽셀/GTM','QA','기타'];
const GANTT_STATUS=['미시작','진행중','완료','보류','이슈'];
const STATUS_COLORS={'미시작':'#94a3b8','진행중':'#2563eb','완료':'#16a34a','보류':'#d97706','이슈':'#dc2626'};

function rGantt(con){
  const proj=getProj();
  if(!proj){con.innerHTML='<div style="padding:30px;text-align:center;color:#94a3b8">프로젝트를 선택해주세요</div>';return;}
  const adv=S.advs[cAdv];
  const gd=getGanttData();
  const tasks=gd.tasks||[];

  // 날짜 범위 계산
  let minDate=null,maxDate=null;
  tasks.forEach(t=>{
    if(t.start){const d=new Date(t.start);if(!minDate||d<minDate)minDate=d;}
    if(t.end){const d=new Date(t.end);if(!maxDate||d>maxDate)maxDate=d;}
  });
  if(gd.milestone?.date){
    const md=new Date(gd.milestone.date);
    if(!minDate||md<minDate)minDate=md;
    if(!maxDate||md>maxDate)maxDate=md;
  }
  // 기본 범위: 오늘 기준 ±14일
  const today=new Date();
  if(!minDate){minDate=new Date(today);minDate.setDate(minDate.getDate()-3);}
  if(!maxDate){maxDate=new Date(today);maxDate.setDate(maxDate.getDate()+14);}
  // 여백 추가
  minDate=new Date(minDate);minDate.setDate(minDate.getDate()-1);
  maxDate=new Date(maxDate);maxDate.setDate(maxDate.getDate()+2);

  const totalDays=Math.ceil((maxDate-minDate)/(1000*60*60*24));
  const DAY_W=42; // px per day

  // 날짜 헤더 생성
  const dayMs=1000*60*60*24;
  const days=[];
  for(let i=0;i<totalDays;i++){
    const d=new Date(minDate.getTime()+i*dayMs);
    days.push(d);
  }

  // 요일 한글
  const DOW=['일','월','화','수','목','금','토'];
  const fmtDate=d=>`${d.getMonth()+1}/${d.getDate()}`;

  // 카테고리별 그룹화
  const cats=[...new Set(tasks.map(t=>t.cat||'기타'))];
  const ungrouped=cats.length===0&&tasks.length===0;

  // 오늘 위치
  const todayOffset=Math.floor((today-minDate)/dayMs);

  con.innerHTML=`
  <style>
    .gantt-wrap{font-family:-apple-system,'Segoe UI','Noto Sans KR',sans-serif}
    .gantt-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .gantt-toolbar h2{font-size:15px;font-weight:700}
    .gantt-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid #dde1e7;background:#fff;cursor:pointer;color:#4a5264;white-space:nowrap}
    .gantt-btn:hover{background:#f0f2f5}
    .gantt-btn.primary{background:#7c3aed;color:#fff;border-color:#7c3aed}
    .gantt-scroll{overflow-x:auto;border:1px solid #dde1e7;border-radius:8px}
    .gantt-table{border-collapse:collapse;min-width:100%}
    .gantt-table th,.gantt-table td{border-bottom:1px solid #e2e8f0}
    .gantt-left-hd{background:#1e293b;color:#fff;padding:8px 12px;text-align:left;font-size:10px;font-weight:600;white-space:nowrap;position:sticky;left:0;z-index:10}
    .gantt-day-hd{background:#1e293b;color:#fff;padding:5px 0;text-align:center;font-size:10px;width:${DAY_W}px;min-width:${DAY_W}px}
    .gantt-day-hd.weekend{background:#2d3748}
    .gantt-day-hd.today-hd{background:#7c3aed}
    .gantt-left{background:#fff;padding:6px 12px;white-space:nowrap;position:sticky;left:0;z-index:5;border-right:2px solid #dde1e7;min-width:0}
    .gantt-left.cat-row{background:#f1f5f9;font-weight:700;font-size:11px;color:#334155}
    .gantt-cell{padding:2px 0;text-align:center;vertical-align:middle;position:relative;width:${DAY_W}px;min-width:${DAY_W}px}
    .gantt-cell.weekend{background:#fafafa}
    .gantt-cell.today-col{background:#f5f3ff}
    .gantt-bar-wrap{position:relative;height:24px;width:100%}
    .gantt-bar{height:18px;border-radius:4px;position:absolute;top:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:600;overflow:hidden;white-space:nowrap;cursor:pointer;z-index:2;box-shadow:0 1px 3px rgba(0,0,0,.15)}
    .gantt-bar:hover{filter:brightness(1.1);box-shadow:0 2px 6px rgba(0,0,0,.2)}
    .gantt-milestone{position:absolute;top:50%;transform:translateY(-50%);font-size:16px;cursor:default;z-index:3}
    .gantt-today-line{position:absolute;top:0;bottom:0;left:50%;width:2px;background:#7c3aed;opacity:.5;pointer-events:none;z-index:4}
    .task-form{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:14px}
    .task-form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px}
    .task-form-grid2{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:8px}
    .tf-group{display:flex;flex-direction:column;gap:3px}
    .tf-label{font-size:10px;font-weight:600;color:#64748b}
    .tf-input{font-size:11px;padding:5px 7px;border:1px solid #dde1e7;border-radius:4px;background:#fff;color:#1c1f26}
    .task-row-act{display:flex;gap:4px;flex-shrink:0}
    .task-del{font-size:10px;padding:2px 6px;border-radius:3px;border:none;background:transparent;cursor:pointer;color:#dc2626}
    .task-del:hover{background:#fef2f2}
    .milestone-bar{display:flex;align-items:center;gap:8px;background:#faf5ff;border:1px solid #ede9fe;border-radius:6px;padding:8px 12px;margin-bottom:10px}
    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#4a5264}
    .legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
  </style>

  <div class="gantt-wrap">
  <div class="gantt-toolbar">
    <div>
      <h2>📅 프로젝트 스케줄</h2>
      <p style="font-size:11px;color:#94a3b8;margin-top:1px">${adv.name} › ${proj.name}</p>
    </div>
    <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
      <button class="gantt-btn primary" onclick="openTaskForm()">＋ 태스크 추가</button>
      <button class="gantt-btn" onclick="ganttExport()">↓ CSV</button>
