  </div>

  <!-- 마일스톤 설정 -->
  <div class="milestone-bar">
    <span style="font-size:12px">⭐ 마일스톤</span>
    <input type="text" class="tf-input" id="ms-label" value="${gd.milestone?.label||''}" placeholder="예: 6.15 LIVE" style="width:160px" oninput="saveMilestone()">
    <input type="date" class="tf-input" id="ms-date" value="${gd.milestone?.date||''}" style="width:140px" onchange="saveMilestone();rGantt(document.getElementById('gt-pane'))">
    <span style="font-size:10px;color:#94a3b8">마일스톤 날짜를 설정하면 간트차트에 ★로 표시됩니다</span>
  </div>

  <!-- 태스크 추가 폼 (hidden) -->
  <div id="task-form" class="task-form" style="display:none">
    <div style="font-size:11px;font-weight:700;color:#7c3aed;margin-bottom:10px" id="task-form-title">태스크 추가</div>
    <input type="hidden" id="task-edit-idx" value="">
    <div class="task-form-grid">
      <div class="tf-group">
        <label class="tf-label">작업 구분 *</label>
        <select id="tf-cat" class="tf-input">
          ${GANTT_CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
      </div>
      <div class="tf-group">
        <label class="tf-label">섹션 그룹</label>
        <input type="text" id="tf-section" class="tf-input" placeholder="예: 비즈니스 포트폴리오">
      </div>
      <div class="tf-group" style="grid-column:span 2">
        <label class="tf-label">작업 항목 *</label>
        <input type="text" id="tf-title" class="tf-input" placeholder="예: 동물자유연대 비즈니스 포트폴리오 생성">
      </div>
    </div>
    <div class="task-form-grid2">
      <div class="tf-group">
        <label class="tf-label">담당자</label>
        <input type="text" id="tf-assignee" class="tf-input" placeholder="예: KAWA, SF">
      </div>
      <div class="tf-group">
        <label class="tf-label">시작일 *</label>
        <input type="date" id="tf-start" class="tf-input">
      </div>
      <div class="tf-group">
        <label class="tf-label">종료일 *</label>
        <input type="date" id="tf-end" class="tf-input">
      </div>
      <div class="tf-group">
        <label class="tf-label">진행 상태</label>
        <select id="tf-status" class="tf-input">
          ${GANTT_STATUS.map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select>
      </div>
      <div class="tf-group">
        <label class="tf-label">메모</label>
        <input type="text" id="tf-note" class="tf-input" placeholder="특이사항">
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="gantt-btn primary" onclick="saveTask()">저장</button>
      <button class="gantt-btn" onclick="document.getElementById('task-form').style.display='none'">취소</button>
    </div>
  </div>

  <!-- 간트차트 본체 -->
  <div class="gantt-scroll">
  <table class="gantt-table">
    <thead>
      <tr>
        <th class="gantt-left-hd" style="width:90px">작업구분</th>
        <th class="gantt-left-hd" style="width:260px;left:90px">작업 항목</th>
        <th class="gantt-left-hd" style="width:70px;left:350px">담당자</th>
        <th class="gantt-left-hd" style="width:70px;left:420px">상태</th>
        ${days.map((d,i)=>{
          const dow=d.getDay();
          const isWeekend=dow===0||dow===6;
          const isToday=i===todayOffset;
          const isMilestone=gd.milestone?.date&&d.toISOString().slice(0,10)===gd.milestone.date;
          return `<th class="gantt-day-hd${isWeekend?' weekend':''}${isToday?' today-hd':''}" title="${d.toISOString().slice(0,10)}">
            <div style="font-size:9px;opacity:.7">${DOW[dow]}</div>
            <div style="font-size:10px;font-weight:${isToday?'700':'400'}">${fmtDate(d)}</div>
            ${isMilestone?`<div style="font-size:10px">⭐</div>`:''}
          </th>`;
        }).join('')}
      </tr>
    </thead>
    <tbody>
      ${(()=>{
        if(!tasks.length) return `<tr><td colspan="${4+days.length}" style="padding:30px;text-align:center;color:#94a3b8;position:sticky;left:0">태스크를 추가해주세요</td></tr>`;
        
        // 카테고리별 그룹
        const catMap={};
        tasks.forEach((t,idx)=>{
          const c=t.cat||'기타';
          if(!catMap[c])catMap[c]=[];
          catMap[c].push({...t,_idx:idx});
        });

        let rows='';
        Object.entries(catMap).forEach(([cat,catTasks])=>{
          // 카테고리 헤더행
          rows+=`<tr style="background:#f1f5f9">
            <td class="gantt-left cat-row" style="left:0">🏷 ${cat}</td>
            <td class="gantt-left cat-row" style="left:90px;width:260px"></td>
            <td class="gantt-left cat-row" style="left:350px;width:70px"></td>
            <td class="gantt-left cat-row" style="left:420px;width:70px"></td>
            ${days.map(d=>{
              const dow=d.getDay();
              const isWeekend=dow===0||dow===6;
              return `<td style="background:${isWeekend?'#f0f2f5':'#f8fafc'};border-bottom:1px solid #e2e8f0"></td>`;
            }).join('')}
          </tr>`;

          catTasks.forEach(task=>{
            const sc=STATUS_COLORS[task.status]||'#94a3b8';
            const statusDot=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${sc};margin-right:3px"></span>`;

            // 섹션 구분선
            const sectionLabel=task.section?`<div style="font-size:9px;color:#94a3b8;font-weight:500;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">[${task.section}]</div>`:'';

            rows+=`<tr style="background:#fff" onmouseenter="this.style.background='#f8fafc'" onmouseleave="this.style.background='#fff'">
              <td class="gantt-left" style="left:0;font-size:10px;color:#64748b;padding-left:20px">${task.cat||'—'}</td>
              <td class="gantt-left" style="left:90px;max-width:260px;width:260px">
                <div style="display:flex;align-items:center;gap:4px">
                  <div style="flex:1;overflow:hidden;max-width:200px">
                    ${sectionLabel}
                    <span style="font-size:11px;color:#1c1f26;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${task.title}">${task.title||'(미입력)'}</span>
                    ${task.note?`<div style="font-size:9px;color:#94a3b8;margin-top:1px">${task.note}</div>`:''}
                  </div>
                  <div class="task-row-act">
                    <button class="gantt-btn" style="font-size:9px;padding:1px 5px" onclick="editTask(${task._idx})">✎</button>
                    <button class="task-del" onclick="delTask(${task._idx})">✕</button>
                  </div>
                </div>
              </td>
              <td class="gantt-left" style="left:350px;font-size:10px;color:#4a5264;text-align:center">${task.assignee||'—'}</td>
              <td class="gantt-left" style="left:420px;text-align:center">
                <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:${sc}20;color:${sc};font-weight:600;white-space:nowrap">${task.status||'미시작'}</span>
              </td>
              ${days.map((d,di)=>{
                const dow=d.getDay();
                const isWeekend=dow===0||dow===6;
                const isToday=di===todayOffset;
                const dStr=d.toISOString().slice(0,10);
                const isMilestone=gd.milestone?.date===dStr;
                
                let barHtml='';
                if(task.start&&task.end){
                  const ts=new Date(task.start),te=new Date(task.end);
                  ts.setHours(0,0,0,0);te.setHours(23,59,59,999);
                  const dc=new Date(d);dc.setHours(12);
                  if(dc>=ts&&dc<=te){
                    const isStart=dStr===task.start;
                    const isEnd=dStr===task.end;
                    const borderR=isEnd?'4px':'0';
                    const borderL=isStart?'4px':'0';
                    barHtml=`<div style="height:18px;margin:3px 0;background:${sc};border-radius:${borderL} ${borderR} ${borderR} ${borderL};opacity:.85;${isStart?'margin-left:4px':''}${isEnd?'margin-right:4px':''}"></div>`;
                  }
                }
                return `<td style="padding:0;background:${isToday?'#f5f3ff':isWeekend?'#fafafa':'#fff'};border-bottom:1px solid #e2e8f0;border-right:${isMilestone?'2px solid #7c3aed':'1px solid #f1f5f9'};position:relative">
                  ${barHtml}
                  ${isMilestone?`<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;z-index:5">⭐</div>`:''}
                  ${isToday&&!barHtml?`<div style="position:absolute;inset:0;border-left:2px solid #7c3aed;opacity:.3;pointer-events:none"></div>`:''}

        });
        return rows;
      })()}
    </tbody>
  </table>
  </div>

  <!-- 범례 -->
  <div class="legend">
    ${GANTT_STATUS.map(s=>`<div class="legend-item"><div class="legend-dot" style="background:${STATUS_COLORS[s]}"></div>${s}</div>`).join('')}

    <div class="legend-item">⭐ 마일스톤</div>

}

function openTaskForm(editIdx){
  const form=document.getElementById('task-form');
  if(!form)return;
  form.style.display='block';
  document.getElementById('task-form-title').textContent=editIdx>=0?'태스크 수정':'태스크 추가';
  document.getElementById('task-edit-idx').value=editIdx>=0?editIdx:'';
  if(editIdx>=0){
    const gd=getGanttData();
    const t=gd.tasks[editIdx];
    document.getElementById('tf-cat').value=t.cat||'Meta';
    document.getElementById('tf-section').value=t.section||'';
    document.getElementById('tf-title').value=t.title||'';
    document.getElementById('tf-assignee').value=t.assignee||'';
    document.getElementById('tf-start').value=t.start||'';
    document.getElementById('tf-end').value=t.end||'';
    document.getElementById('tf-status').value=t.status||'미시작';
    document.getElementById('tf-note').value=t.note||'';
  } else {
    ['tf-section','tf-title','tf-assignee','tf-start','tf-end','tf-note'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('tf-cat').value='Meta';
    document.getElementById('tf-status').value='미시작';
  }
  form.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function editTask(idx){openTaskForm(idx);}

function saveTask(){
  const title=document.getElementById('tf-title')?.value.trim();
  const start=document.getElementById('tf-start')?.value;
  const end=document.getElementById('tf-end')?.value;
  if(!title){alert('작업 항목을 입력해주세요');return;}
  if(start&&end&&start>end){alert('종료일이 시작일보다 빠릅니다');return;}
  const task={
    cat:document.getElementById('tf-cat')?.value||'기타',
    section:document.getElementById('tf-section')?.value.trim()||'',
    title,
    assignee:document.getElementById('tf-assignee')?.value.trim()||'',
    start,end,
    status:document.getElementById('tf-status')?.value||'미시작',
    note:document.getElementById('tf-note')?.value.trim()||'',
  };
  const gd=getGanttData();
  const editIdx=document.getElementById('task-edit-idx')?.value;
  if(editIdx!==''){gd.tasks[parseInt(editIdx)]=task;}
  else{gd.tasks.push(task);}
  sv();
  document.getElementById('task-form').style.display='none';
  const con=document.getElementById('gt-pane');if(con)rGantt(con);
}

function delTask(idx){
  if(!confirm('태스크를 삭제할까요?'))return;
  const gd=getGanttData();
  gd.tasks.splice(idx,1); sv();
  const con=document.getElementById('gt-pane');if(con)rGantt(con);
}

function saveMilestone(){
  const gd=getGanttData();
  gd.milestone={
    label:document.getElementById('ms-label')?.value||'',
    date:document.getElementById('ms-date')?.value||'',
  };
  sv();
}

function ganttExport(){
  const proj=getProj(),adv=S.advs[cAdv];if(!proj)return;
  const gd=getGanttData();
  if(!gd.tasks.length){alert('태스크가 없습니다');return;}
  const header=['작업구분','섹션','작업항목','담당자','시작일','종료일','진행상태','메모'];
  const csv=[header,...gd.tasks.map(t=>[t.cat,t.section,t.title,t.assignee,t.start,t.end,t.status,t.note])].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const el=document.createElement('a');
  const fname=`${adv.name}_${proj.name}_간트차트_${new Date().toISOString().slice(0,10)}.csv`;
  try{
    const blob=new Blob([new Uint8Array([0xEF,0xBB,0xBF]),csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    el.href=url;el.download=fname;document.body.appendChild(el);el.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(el);},200);
  }catch(e){alert('다운로드 실패');}
}


function expCl(){
  var proj=getProj(),adv=S.advs[cAdv];if(!proj)return;
  if(!S.cl)S.cl={};
  var NL=String.fromCharCode(10);
  var header=['광고주','프로젝트','레벨','캠페인명','광고그룹명','광고명','항목','값','완료여부','플랫폼','담당자','요청상태'];
  var rows=[header];
  (proj.campaigns||[]).forEach(function(camp){
    var ck=clKey(camp.id,'','');
    var ci=getClItem(ck);
    CL_CAMP_FIELDS.forEach(function(fd){
      var val=fd.k==='date_start'?((ci.fields.date_start||'')+'~'+(ci.fields.date_end||'')):ci.fields[fd.k]||'';
      rows.push([adv.name,proj.name,'캠페인',camp.name||'','-','-',fd.l,val,ci.done[fd.k]?'완료':'미완',ci.meta&&ci.meta.platform||'',ci.meta&&ci.meta.manager||'',ci.meta&&ci.meta.reqStatus||'']);
    });
    var gf=ci.fields||{};
    if(gf.budget_gross&&gf.markup&&gf.markup_formula){
      var g=parseFloat((gf.budget_gross||'').replace(/,/g,''));
      var m=parseFloat(gf.markup||0)/100;
      var net=gf.markup_formula==='산술식2'?g/(1+m):g/(1-m);
      rows.push([adv.name,proj.name,'캠페인',camp.name||'','-','-','총예산 Net(계산)',Math.round(net).toLocaleString()+'원','자동계산','','','']);
    }
    (camp.groups||[]).forEach(function(g){
      var gk=clKey(camp.id,g.id,'');
      var gi=getClItem(gk);
      CL_GRP_FIELDS.forEach(function(fd){
        rows.push([adv.name,proj.name,'광고그룹',camp.name||'',g.name||'','-',fd.l,gi.fields[fd.k]||'',gi.done[fd.k]?'완료':'미완',gi.meta&&gi.meta.platform||'',gi.meta&&gi.meta.manager||'',gi.meta&&gi.meta.reqStatus||'']);
      });
      (g.ads||[]).forEach(function(a){
        var ak=clKey(camp.id,g.id,a.id);
        var ai=getClItem(ak);
        CL_AD_FIELDS.forEach(function(fd){
          rows.push([adv.name,proj.name,'광고',camp.name||'',g.name||'',a.name||'',fd.l,ai.fields[fd.k]||'',ai.done[fd.k]?'완료':'미완',ai.meta&&ai.meta.platform||'',ai.meta&&ai.meta.manager||'',ai.meta&&ai.meta.reqStatus||'']);
        });
      });
    });
  });
  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v||'').replace(/"/g,'""')+'"';}).join(',');}).join(NL);
  var el=document.createElement('a');
  var fname=adv.name+'_'+proj.name+'_세팅체크리스트_'+new Date().toISOString().slice(0,10)+'.csv';
  try{
    var blob=new Blob([new Uint8Array([0xEF,0xBB,0xBF]),csv],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    el.href=url;el.download=fname;document.body.appendChild(el);el.click();
    setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(el);},200);
  }catch(e){alert('다운로드 실패');}
}

var _ddTimers={};

function openDd(id){
  // 다른 드롭다운 모두 닫기
  ['dd-naming','dd-setting'].forEach(function(did){
    if(did!==id) closeDd(did);

    // 화살표 회전
    var arr=document.getElementById('arr-'+id.replace('dd-',''));
    if(arr)arr.classList.add('open');
  }
}

function keepDd(id){
  clearTimeout(_ddTimers[id]);
}

function scheduleDdClose(id){
  clearTimeout(_ddTimers[id]);
  _ddTimers[id]=setTimeout(function(){closeDd(id);}, 200);
}

function closeDd(id){
  clearTimeout(_ddTimers[id]);
  var el=document.getElementById(id);
  if(el){
    el.classList.remove('open');
    var arr=document.getElementById('arr-'+id.replace('dd-',''));
    if(arr)arr.classList.remove('open');
  }
}

// S.mm = { [advId__projId]: { rows: [...] } }
if(!S.mm)S.mm={};

function mmKey(){ return cAdv+'__'+cProj; }
function getMMData(){
  if(!cAdv||!cProj)return{rows:[]};
  var k=mmKey();
  if(!S.mm[k])S.mm[k]={rows:[]};
  return S.mm[k];
}

var MM_SEGS=['Awareness','Engagement','Conversion'];

// 자동계산
function mmCalc(r){
  var gross=parseFloat((r.budget||'0').toString().replace(/,/g,''))||0;
  var cpm=parseFloat((r.cpm||'0').toString().replace(/,/g,''))||0;
  var ctr=parseFloat(r.ctr||0)/100||0;
  var vtr=parseFloat(r.vtr||0)/100||0;
  var er=parseFloat(r.er||0)/100||0;
  var cvr=parseFloat(r.cvr||0)/100||0;
  var days=0;
  if(r.date_start&&r.date_end){
    var d=Math.ceil((new Date(r.date_end)-new Date(r.date_start))/86400000)+1;
    if(d>0)days=d;
  }
  var impression = cpm>0 ? Math.round(gross/cpm*1000) : 0;
  var click      = Math.round(impression*ctr);
  var view       = Math.round(impression*vtr);
  var eng        = Math.round(impression*er);
  var cpc        = click>0 ? Math.round(gross/click) : 0;
  var cpv        = view>0  ? Math.round(gross/view)  : 0;
  var action     = Math.round(click*cvr);
  return {days:days, impression:impression, click:click, view:view, eng:eng, cpc:cpc, cpv:cpv, action:action};
}

function fmt(n){ return n?n.toLocaleString():'—'; }
function fmtPct(v){ return v?parseFloat(v).toFixed(2)+'%':'—'; }

function saveMMRow(idx, field, val){
  var d=getMMData();
  if(!d.rows[idx])return;
  // 숫자 필드는 콤마 제거 후 저장
  var numFields=['budget','cpm','target'];
  if(numFields.indexOf(field)>=0){
    val=val.toString().replace(/,/g,'').replace(/[^0-9.]/g,'');
  }
  d.rows[idx][field]=val;
  sv();
  refreshMMRow(idx);
}

function numFmt(val){
  var n=parseFloat((val||'').replace(/[^0-9.]/g,''));
  return isNaN(n)?val:(n.toLocaleString());
}

function refreshMMRow(idx){
  var d=getMMData();
  var r=d.rows[idx];if(!r)return;
  var c=mmCalc(r);
  var fields={
    '_days': r.date_start&&r.date_end?c.days+'일':'—',
    '_imp':  fmt(c.impression),
    '_clk':  fmt(c.click),
    '_view': fmt(c.view),
    '_eng':  fmt(c.eng),
    '_cpc':  c.cpc?c.cpc.toLocaleString():'—',
    '_cpv':  c.cpv?c.cpv.toLocaleString():'—',
    '_act':  fmt(c.action),
  };
  Object.keys(fields).forEach(function(k){
    var el=document.getElementById('mm-'+idx+k);
    if(el)el.textContent=fields[k];
  });
}

function addMMRow(seg){
  var d=getMMData();
  d.rows.push({seg:seg,platform:'',campaign:'',objective:'',adgroup:'',
    date_start:'',date_end:'',target:'',budget:'',cpm:'',
    ctr:'',vtr:'',er:'',cvr:''});
  sv();
  var con=document.getElementById('mm-pane');if(con)rMediaMix(con);
}

function delMMRow(idx){
  var d=getMMData();
  d.rows.splice(idx,1); sv();
  var con=document.getElementById('mm-pane');if(con)rMediaMix(con);
}

function rMediaMix(con){
  var proj=getProj();
  if(!proj){con.innerHTML='<div style="padding:30px;text-align:center;color:var(--tx3)">프로젝트를 선택해주세요</div>';return;}
  var adv=S.advs[cAdv];
  var d=getMMData();
  // 세그먼트 순서 고정 정렬
  var SEG_ORDER={Awareness:0,Engagement:1,Conversion:2};
  d.rows.sort(function(a,b){
    return (SEG_ORDER[a.seg]||0)-(SEG_ORDER[b.seg]||0);
  });
  var rows=d.rows||[];

  var C={hd:'#1e293b',hd2:'#334155',hdTxt:'#e2e8f0',hdTxt2:'#94a3b8',hdBd:'#475569',bd:'#e8eaed'};

    Awareness: {bg:'#eff6ff',border:'#bfdbfe',color:'#1d4ed8',light:'#dbeafe'},
    Engagement:{bg:'#f0fdf4',border:'#bbf7d0',color:'#15803d',light:'#dcfce7'},
    Conversion:{bg:'#fdf4ff',border:'#e9d5ff',color:'#7c3aed',light:'#ede9fe'}
  };

  // 세그먼트별 합산
  var segTotals={};
  MM_SEGS.forEach(function(sg){segTotals[sg]={budget:0,impression:0,click:0,view:0,eng:0,action:0,cnt:0};});
  var grand={budget:0,impression:0,click:0,view:0,eng:0,action:0};
  rows.forEach(function(r){
    var c=mmCalc(r);var sg=r.seg||'Awareness';
    var st=segTotals[sg];var b=parseFloat((r.budget||'0').toString().replace(/,/g,''))||0;
    st.budget+=b;st.impression+=c.impression;st.click+=c.click;
    st.view+=c.view;st.eng+=c.eng;st.action+=c.action;st.cnt++;
    grand.budget+=b;grand.impression+=c.impression;grand.click+=c.click;
    grand.view+=c.view;grand.eng+=c.eng;grand.action+=c.action;
  });

  function fmt(n){return n?n.toLocaleString():'—';}

  // 인풋 헬퍼
  function mmI(ridx,field,val,ph,w){
    var numF=['budget','cpm','target'];
    var isN=numF.indexOf(field)>=0;
    var dv=isN&&val?parseFloat((val+'').replace(/[^0-9.]/g,'')).toLocaleString():(val||'');
    var style='width:'+(w||'100%')+';font-size:10px;padding:3px 5px;border:1px solid #dde1e7;border-radius:3px;background:#fff;color:#1c1f26;box-sizing:border-box'+(isN?';text-align:right;font-weight:500':'');
    var el='<input type="text" value="'+dv+'" placeholder="'+(ph||'')+'"'
      +' data-idx="'+ridx+'" data-field="'+field+'"'
      +' style="'+style+'"'
      +' oninput="saveMMRow(+this.dataset.idx,this.dataset.field,this.value)"';
    if(isN) el+=' onblur="mmFmtNum(this)"';
    return el+'>';
  }
    function mmD(idx,field,val){
    return '<input type="date" value="'+(val||'')+'"'
      +' style="width:100%;font-size:10px;padding:3px 4px;border:1px solid #dde1e7;border-radius:3px;background:#fff;color:#1c1f26;box-sizing:border-box"'
      +' oninput="saveMMRow('+idx+',\''+field+'\',this.value)">';
  }
  function mmP(ridx,field,val){
    return '<div style="display:flex;align-items:center;gap:2px">'
      +'<input type="number" min="0" max="100" step="0.01" value="'+(val||'')+'" placeholder="0"'
      +' data-idx="'+ridx+'" data-field="'+field+'"'
      +' style="width:52px;font-size:10px;padding:3px 5px;border:1px solid #dde1e7;border-radius:3px;background:#fff;color:#1c1f26;text-align:right;font-weight:500"'
      +' oninput="saveMMRow(+this.dataset.idx,this.dataset.field,this.value)">'
      +'<span style="font-size:10px;color:#94a3b8;flex-shrink:0">%</span></div>';
  }

  function ac(idx,key,val){
    return '<td style="padding:4px 8px;text-align:right;border-right:1px solid '+C.bd+';border-bottom:1px solid '+C.bd
      +';background:#f8fafc;font-size:10px;font-weight:500;color:#334155;white-space:nowrap">'
      +'<span id="mm-'+idx+key+'">'+val+'</span></td>';
  }
  function ic(inner,bg,w){
    return '<td style="padding:3px 5px;border-right:1px solid '+C.bd+';border-bottom:1px solid '+C.bd
      +';background:'+(bg||'#fff')+';'+(w?'min-width:'+w+'px;':'')+'">'+(inner)+'</td>';
  }
    function calcTotKPIs(st){
    // 모든 지표를 누적값 기반으로 올바르게 계산
    var imp=st.impression, clk=st.click, view=st.view, eng=st.eng, act=st.action, bgt=st.budget;
    return {
      cpm:   imp>0  ? Math.round(bgt/imp*1000)    : 0,
      ctr:   imp>0  ? (clk/imp*100).toFixed(2)+'%'  : '—',
      vtr:   imp>0  ? (view/imp*100).toFixed(2)+'%' : '—',
      cpc:   clk>0  ? Math.round(bgt/clk)           : 0,
      cpv:   view>0 ? Math.round(bgt/view)           : 0,
      er:    imp>0  ? (eng/imp*100).toFixed(2)+'%'  : '—',
      cvr:   clk>0  ? (act/clk*100).toFixed(2)+'%'  : '—',
    };
  }

  function subTotRow(seg,st){
    var sc=segColors[seg]||segColors.Awareness;
    var k=calcTotKPIs(st);
    function stc(v){
      return '<td style="padding:5px 8px;text-align:right;border-right:1px solid '+C.bd
        +';border-bottom:2px solid '+sc.border+';background:'+sc.light
        +';font-size:10px;font-weight:700;color:'+sc.color+'">'+v+'</td>';

      +';background:'+sc.light+';font-size:11px;font-weight:700;color:'+sc.color+'">'+seg+' 소계 ('+st.cnt+'개)</td>'

      +stc(st.click?st.click.toLocaleString():'—')

      +stc(k.er)
      +stc(st.eng?st.eng.toLocaleString():'—')

      +stc(st.action?st.action.toLocaleString():'—')

  function grandRow(gt){
    var k=calcTotKPIs(gt);
    function gtc(v){
      return '<td style="padding:6px 8px;text-align:right;border-right:1px solid '+C.hdBd

      +gtc(gt.impression?gt.impression.toLocaleString():'—')
      +gtc(k.ctr)
      +gtc(gt.click?gt.click.toLocaleString():'—')
      +gtc(k.vtr)
      +gtc(gt.view?gt.view.toLocaleString():'—')
      +gtc(k.cpc?k.cpc.toLocaleString():'—')
      +gtc(k.cpv?k.cpv.toLocaleString():'—')
      +gtc(k.er)
      +gtc(gt.eng?gt.eng.toLocaleString():'—')

  h+='</div>';
  h+='<button onclick="mmExport()" class="btn">↓ CSV</button>';
  h+='</div></div>';

  // 테이블
  h+='<div style="overflow-x:auto;border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh2)">';
  h+='<table class="mm-tbl"><thead>';

  // 헤더
  var th='padding:8px 10px;text-align:center;border-right:1px solid '+C.hdBd+';font-size:11px;font-weight:600';
  var thl='padding:8px 10px;text-align:left;border-right:1px solid '+C.hdBd+';font-size:11px;font-weight:600';

    var mw=[100,80,160,90,140][i];

      h+=ac(i,'_view',fmt(c.view));
      h+=ac(i,'_cpc',fmt(c.cpc));
      h+=ac(i,'_cpv',fmt(c.cpv));
      h+=ic(mmP(i,'er',r.er),bg,60);
      h+=ac(i,'_eng',fmt(c.eng));
      h+=ic(mmP(i,'cvr',r.cvr),bg,60);
      h+=ac(i,'_act',fmt(c.action));
      h+='<td style="padding:3px 5px;text-align:center;border-bottom:1px solid '+C.bd+';background:'+bg+'">'
        +'<button onclick="delMMRow('+i+')" style="font-size:11px;padding:2px 5px;border:none;background:transparent;cursor:pointer;color:#dc2626" title="삭제">✕</button></td>';
      h+='</tr>';
    });

    // 마지막 세그먼트 소계
    if(prevSeg&&segTotals[prevSeg].cnt>0){
      h+=subTotRow(prevSeg,segTotals[prevSeg]);
    }
  }

  // 전체 합계
  h+=grandRow(grand);
  h+='</tbody></table></div>';

  con.innerHTML=h;
  con._rows=rows;
}

function addMMRowSel(){
  var sel=document.getElementById('mm-seg-sel');
  var seg=sel?sel.value:'Awareness';
  addMMRow(seg);
}

function mmExport(){
  var proj=getProj(),adv=S.advs[cAdv];if(!proj)return;
  var d=getMMData();var rows=d.rows||[];
  var NL=String.fromCharCode(10);
  var header=['세그먼트','플랫폼','캠페인','목적(KPI)','광고그룹','시작일','종료일','일수','예산(Gross)','CPM','노출','CTR%','클릭','VTR%','조회','CPC','CPV','ER%','Eng','CVR%','Action'];
  var data=[header];
  rows.forEach(function(r){
    var c=mmCalc(r);
    data.push([r.seg,r.platform,r.campaign,r.objective,r.adgroup,r.date_start,r.date_end,c.days?c.days+'일':'',r.budget,r.cpm,c.impression,r.ctr?r.ctr+'%':'',c.click,r.vtr?r.vtr+'%':'',c.view,c.cpc,c.cpv,r.er?r.er+'%':'',c.eng,r.cvr?r.cvr+'%':'',c.action]);
  });
  var csv=data.map(function(r){return r.map(function(v){return '"'+String(v||'').replace(/"/g,'""')+'"';}).join(',');}).join(NL);
  var el=document.createElement('a');
  var fname=adv.name+'_'+proj.name+'_미디어믹스_'+new Date().toISOString().slice(0,10)+'.csv';
  try{
    var blob=new Blob([new Uint8Array([0xEF,0xBB,0xBF]),csv],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    el.href=url;el.download=fname;document.body.appendChild(el);el.click();
    setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(el);},200);
  }catch(e){alert('다운로드 실패');}
}

function mmFmtNum(el){
  var n=parseFloat((el.value||'').replace(/[^0-9.]/g,''));
  if(!isNaN(n)) el.value=n.toLocaleString();
}

function cm(id){document.getElementById(id).style.display='none';}
ld();
